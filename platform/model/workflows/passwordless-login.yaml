name: passwordless-login
version: 1.0.0
description: >
  Passwordless authentication flow using magic links or OTP.
  Generates one-time token, sends to user's email, validates
  on return, and establishes session.

trigger:
  type: http_request
  source: POST /api/auth/magic-link

steps:
  - name: generate_token
    action: user-service/generate_magic_link_token
    next:
      - send_email

  - name: send_email
    action: event-bus/publish
    parameters:
      event: MagicLinkRequested
    next: []

timeout: PT5M
retry_policy: retry.short
