name: turso
type: database
description: >
  SQLite-compatible distributed database (libSQL).
  Primary data store for all services with multi-tenant isolation
  via row-level security. Local development uses embedded SQLite.

technology: turso/libsql
version: "0.1.0"

adapters:
  - packages/adapters/storage/turso
  - packages/adapters/storage/sqlite

local_dev:
  compose_file: infra/local/compose/core.yaml
  env_vars:
    TURSO_DATABASE_URL: "file:local.db"
    TURSO_AUTH_TOKEN: "dev-token"

encryption:
  at_rest: true
  in_transit: true

access_control:
  rbac: true
  abac: false

required_by:
  - counter-service
  - user
  - tenant
  - auth
