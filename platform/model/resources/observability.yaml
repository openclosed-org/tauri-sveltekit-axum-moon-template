name: observability
type: observability
description: >
  Telemetry stack for logging, metrics, tracing, and distributed
  tracing. Uses OpenTelemetry SDK with vector for log aggregation
  and OpenObserve for storage and visualization.

technology: otel/vector/openobserve
version: "1.0"

adapters:
  - packages/adapters/telemetry/otel
  - packages/adapters/telemetry/tracing

local_dev:
  compose_file: infra/local/compose/observability.yaml
  env_vars:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
    LOG_LEVEL: "debug"

required_by:
  - api-server
  - web-bff
  - admin-bff
  - edge-gateway
