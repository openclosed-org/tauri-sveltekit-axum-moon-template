name: default
type: timeout
description: >
  Default timeout policy for HTTP requests and async operations.

rules:
  - condition: "operation.type == http"
    action: "timeout"
    parameters:
      duration_seconds: 30

  - condition: "operation.type == async_job"
    action: "timeout"
    parameters:
      duration_seconds: 300

applies_to:
  - "*"
