name: default
type: outbox
description: >
  Outbox pattern policy for reliable event delivery.
  Defines polling intervals, batch sizes, and retry behavior
  for the outbox relay worker.

rules:
  - condition: "operation == outbox_poll"
    action: "configure"
    parameters:
      poll_interval_ms: 500
      batch_size: 50
      dedup_window_seconds: 3600
      checkpoint_after_batch: true

applies_to:
  - outbox-relay-worker
