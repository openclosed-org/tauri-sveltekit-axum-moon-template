name: auth-service
kind: planned-service
criticality: high
tenant_scope: user
logical_dependencies:
  - user-service
status: stub
description: >
  Planned authentication-related capability. Not part of the first-wave
  reference modules; kept as a future domain placeholder.

authentication:
  required: false
  methods:
    - oauth2
    - passwordless

authorization:
  required: false
  model: none

observability:
  tracing:
    enabled: true
    sampler: parentbased_always_on
  metrics:
    enabled: true
  logging:
    level: info
    format: json
