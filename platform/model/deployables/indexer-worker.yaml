name: indexer-worker
type: worker
version: 0.1.0
description: >
  Full-text search indexer. Consumes events from the message broker,
  transforms domain entities into search documents, and writes to
  the search index. Supports incremental indexing with source-level
  checkpoint tracking.

current_status: stub
target_status: independent
planned_capabilities:
  - durable indexing pipeline beyond current stub implementation

services: []

resources:
  - nats

entry_point: workers/indexer/src/main.rs
package: indexer-worker
independent_deploy: false

health_check:
  path: /healthz
  port: 3040
  interval_seconds: 10

ports:
  - 3040

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
