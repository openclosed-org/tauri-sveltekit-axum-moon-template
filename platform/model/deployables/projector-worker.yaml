name: projector-worker
type: projector
version: 0.1.0
description: >
  Reference event-driven projector. Consumes domain events and builds
  denormalized read models that must remain replayable and rebuildable.

current_status: implemented
target_status: independent
planned_capabilities: []

services: []

runtime_profile: async-projection
statefulness: checkpointed
required_identity: ephemeral
required_storage: ephemeral
scaling_axis:
  - event_throughput
  - projection_lag
failure_domain: async-projection

resources:
  - turso

entry_point: workers/projector/src/main.rs
package: projector-worker
independent_deploy: true

health_check:
  path: /healthz
  port: 3050
  interval_seconds: 10

ports:
  - 3050

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
