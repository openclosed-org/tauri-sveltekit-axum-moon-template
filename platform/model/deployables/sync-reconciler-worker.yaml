name: sync-reconciler-worker
type: worker
version: 0.1.0
description: >
  Sync conflict resolution and reconciliation worker. Handles
  offline-first sync scenarios, detects conflicts between client
  and server state, applies conflict resolution strategies, and
  reconciles divergent state. Supports CRDT-based and last-write-wins
  resolution strategies.

current_status: stub
target_status: independent
planned_capabilities:
  - real reconciliation engine beyond current stub implementation

services: []

resources:
  - turso

entry_point: workers/sync-reconciler/src/main.rs
package: sync-reconciler-worker
independent_deploy: false

health_check:
  path: /healthz
  port: 3070
  interval_seconds: 10

ports:
  - 3070

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
