name: scheduler-worker
type: worker
version: 0.1.0
description: >
  Time-based job scheduler and dispatcher. Manages cron-like jobs,
  delayed job execution, and recurring task scheduling. Maintains
  job registry with scheduling metadata and execution history.

current_status: stub
target_status: independent
planned_capabilities:
  - durable scheduling and dispatch beyond current stub implementation

services: []

resources:
  - turso

entry_point: workers/scheduler/src/main.rs
package: scheduler-worker
independent_deploy: false

health_check:
  path: /healthz
  port: 3060
  interval_seconds: 10

ports:
  - 3060

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
