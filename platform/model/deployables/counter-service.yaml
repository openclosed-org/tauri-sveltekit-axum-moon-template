name: counter-service
type: server
version: 1.0.0
description: >
  Reference counter service capability. Currently hosted inside web-bff;
  target state keeps an independent deployable boundary for topology evolution.
  Hosts the counter aggregate with CAS versioning, idempotency cache,
  and unified event outbox.

current_status: embedded
target_status: independent
planned_capabilities:
  - standalone HTTP process for counter-only deployment
  - dedicated counter service scaling separate from web-bff

services:
  - counter-service

runtime_profile: http-latency-sensitive
statefulness: stateful
required_identity: stable
required_storage: persistent
scaling_axis:
  - cpu
  - request_rate
  - write_throughput
failure_domain: counter-primary

resources:
  - turso

entry_point: servers/bff/web-bff/src/main.rs
package: web-bff

health_check:
  path: /healthz
  port: 3010
  interval_seconds: 10

ports:
  - 3010

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s

independent_deploy: false
embedded_in:
  - web-bff
