name: web-bff
type: bff
version: 1.0.0
description: >
  Web backend-for-frontend for user-facing surfaces.
  Aggregates reference services into view-oriented APIs and exposes
  the primary synchronous reference entrypoints.

current_status: implemented
target_status: independent
planned_capabilities: []

services:
  - counter-service
  - tenant-service

runtime_profile: http-latency-sensitive
statefulness: stateless
required_identity: ephemeral
required_storage: none
scaling_axis:
  - cpu
  - request_rate
failure_domain: web-edge

resources:
  - cache

entry_point: servers/bff/web-bff/src/main.rs
package: web-bff
independent_deploy: true

health_check:
  path: /healthz
  port: 3010
  interval_seconds: 10

ports:
  - 3010

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
