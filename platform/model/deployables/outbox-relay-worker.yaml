name: outbox-relay-worker
type: relay
version: 1.0.0
description: >
  Reference outbox relay worker. Polls pending outbox records,
  publishes them to the message backbone, and records delivery progress.

current_status: implemented
target_status: independent
planned_capabilities: []

services: []

runtime_profile: async-delivery
statefulness: checkpointed
required_identity: ephemeral
required_storage: ephemeral
scaling_axis:
  - queue_depth
  - publish_latency
failure_domain: async-relay

resources:
  - turso
  - nats

entry_point: workers/outbox-relay/src/main.rs
package: outbox-relay-worker
independent_deploy: true

health_check:
  path: /healthz
  port: 3030
  interval_seconds: 10

ports:
  - 3030

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
