name: edge-gateway
type: gateway
version: 1.0.0
description: >
  Reverse proxy and edge gateway (Pingora-based).
  Currently handles local health/readiness and path-based routing to web-bff
  and the web upstream. Target state may add edge security and traffic controls.

current_status: implemented
target_status: independent
planned_capabilities:
  - TLS termination
  - rate limiting
  - authentication passthrough
  - multi-backend load balancing policy

services: []

resources: []

entry_point: servers/gateway/src/main.rs
package: pingora-gateway
independent_deploy: true

health_check:
  path: /healthz
  port: 8080
  interval_seconds: 10

ports:
  - 80
  - 443

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
