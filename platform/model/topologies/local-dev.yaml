name: local-dev
version: 1.0.0
description: >
  Local development topology. All deployables run on localhost
  with embedded or dockerized resources. Single-node, no replication.

deployables:
  - name: web-bff
    replicas: 1
    enabled: true

  - name: edge-gateway
    replicas: 1
    enabled: true

  - name: outbox-relay-worker
    replicas: 1
    enabled: false

  - name: indexer-worker
    replicas: 1
    enabled: false

  - name: projector-worker
    replicas: 1
    enabled: false

  - name: scheduler-worker
    replicas: 1
    enabled: false

  - name: sync-reconciler-worker
    replicas: 1
    enabled: false

resources:
  - name: turso
    enabled: true
    config:
      mode: "embedded"

  - name: cache
    enabled: true
    config:
      backend: "moka"

  - name: observability
    enabled: false

network:
  gateway: "localhost:8080"
  exposed_ports:
    - 3010
    - 3020
    - 8080
