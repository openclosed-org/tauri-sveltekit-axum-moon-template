tasks:
  build:
    command: 'cargo build'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
    inputs:
      - 'src-tauri/**/*'
      - 'src-tauri/Cargo.toml'

  check:
    command: 'cargo check'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
    inputs:
      - 'src-tauri/**/*'
      - 'src-tauri/Cargo.toml'

  lint:
    command: 'cargo clippy'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
      - '--'
      - '-D'
      - 'warnings'
    inputs:
      - 'src-tauri/**/*'
      - 'src-tauri/Cargo.toml'

  format:
    command: 'cargo fmt'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
    inputs:
      - 'src-tauri/**/*'
