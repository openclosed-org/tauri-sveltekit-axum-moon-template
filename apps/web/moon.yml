tasks:
  dev:
    command: 'bun run dev'

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'package.json'

  check:
    command: 'bun run check'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'

  format:
    command: 'bun run format'
    inputs:
      - 'src/**/*'
