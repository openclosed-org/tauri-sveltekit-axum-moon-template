tasks:
  dev:
    command: 'bun run dev'
    local: true
    platform: 'system'

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'svelte.config.js'
      - 'vite.config.ts'
      - 'package.json'
    platform: 'system'

  check:
    command: 'bun run check'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    platform: 'system'

  lint:
    command: 'bun run lint'
    inputs:
      - 'src/**/*'
    platform: 'system'

  format:
    command: 'bun run format'
    inputs:
      - 'src/**/*'
    platform: 'system'

  # Tauri 相关
  tauri:build:
    command: 'cargo build'
    args:
      - '--manifest-path'
      - 'src-tauri/Cargo.toml'
    inputs:
      - 'src-tauri/**/*'
      - 'src-tauri/Cargo.toml'
    platform: 'system'
