# Podman Compose — Observability Stack (Lightweight)
#
# Usage:
#   podman compose -f infra/docker/compose/observability.yaml up -d
#
# Provides local-dev observability:
#   - OpenObserve: logs/metrics/traces UI (single binary, replaces Loki+Grafana+Tempo)
#   - Vector: log routing + transformation (ships logs from containers to OpenObserve)
#
# This stack is intentionally lightweight. Production uses the k3s-native stack.
#
# Note: Podman does not expose container logs via /var/lib/docker/containers.
# Vector reads logs via the podman API socket or directly from journald.
# For dev simplicity, you can also pipe logs manually:
#   podman logs <container> | vector --config ops/observability/vector/vector.yaml

services:
  # ── OpenObserve ─────────────────────────────────────────────
  # Single-binary observability platform (logs + metrics + traces)
  # Docs: https://openobserve.ai/docs/
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.14.1
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@localhost
      - ZO_ROOT_USER_PASSWORD=admin
      - ZO_DATA_DIR=/data
    volumes:
      - openobserve-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Vector (Log Router) ────────────────────────────────────
  # Collects Podman container logs and forwards them to OpenObserve.
  # Config: ops/observability/vector/
  #
  # Podman compatibility: Vector reads logs via the Podman socket
  # or via journald. For dev simplicity, we use the podman-events
  # source + direct container log streaming.
  vector:
    image: timberio/vector:0.46.0-alpine
    volumes:
      # Podman socket (rootless or rootful)
      - /run/podman/podman.sock:/run/podman/podman.sock:ro
      # Vector config
      - ../../../ops/observability/vector/vector.yaml:/etc/vector/vector.yaml:ro
    environment:
      - VECTOR_LOG=openobserve
      - PODMAN_SOCKET=/run/podman/podman.sock
    depends_on:
      openobserve:
        condition: service_healthy
    restart: unless-stopped

volumes:
  openobserve-data:
