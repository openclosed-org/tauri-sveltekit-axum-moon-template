# Podman Compose — Local Auth Stack (Rauthy + OpenFGA)
#
# Usage:
#   podman compose -f infra/docker/compose/auth.yaml up -d
#   podman compose -f infra/docker/compose/auth.yaml down
#
# Notes:
# - This is a local-only single-node stack.
# - `repo-tools infra auth bootstrap` provisions OpenFGA and writes generic APP_OIDC_* / APP_AUTHZ_* env.

services:
  mailcrab:
    image: marlonb/mailcrab:v1.1.0
    ports:
      - "1080:1080"

  rauthy:
    image: ghcr.io/sebadob/rauthy:0.35.1
    environment:
      - LOCAL_TEST=true
      - LISTEN_SCHEME=http
      - PUB_URL=localhost:8082
      - COOKIE_MODE=danger-insecure
      - HQL_INSECURE_COOKIE=true
      - SMTP_URL=mailcrab
      - SMTP_PORT=1025
      - SMTP_DANGER_INSECURE=true
    ports:
      - "8082:8080"
    volumes:
      - rauthy-data:/app/data
    depends_on:
      - mailcrab

  openfga-migrate:
    image: openfga/openfga:v1.15.0
    command:
      - migrate
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
    user: nonroot
    volumes:
      - openfga-data:/home/nonroot

  openfga:
    image: openfga/openfga:v1.15.0
    command:
      - run
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
      - --playground-enabled
    user: nonroot
    ports:
      - "8081:8080"
      - "3003:3000"
    volumes:
      - openfga-data:/home/nonroot
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8081"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

volumes:
  rauthy-data:
  openfga-data:
