# Kustomization — Base resources
# Application images in this base use `:template-local` placeholders. Do not
# deploy them as-is to shared environments; overlays or CI release tooling must
# replace them with an immutable digest or an explicit release tag.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - network-policy.yaml
  - configmap.yaml
  - configmap-outbox-relay-worker.yaml
  - configmap-projector-worker.yaml
  - deployment-outbox-relay-worker.yaml
  - deployment-web-bff.yaml
  - deployment-web.yaml
  - deployment-projector-worker.yaml
  - service.yaml
  - ingress.yaml
