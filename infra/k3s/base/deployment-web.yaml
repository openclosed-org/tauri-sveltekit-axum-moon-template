# Deployment — Web Frontend (SvelteKit static + nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: app
  labels:
    app.kubernetes.io/name: web-server
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: tauri-sveltekit-axum
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-server
        app.kubernetes.io/component: frontend
      annotations:
        kubectl.kubernetes.io/default-container: web-server
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-server
          # Template placeholder. Release overlays or CI must replace this with a tag or digest.
          image: web-app:template-local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
