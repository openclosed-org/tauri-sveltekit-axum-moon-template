# Kustomization — Dev shared counter DB credential marker
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The counter-shared-db Secret is applied by `repo-tools secrets reconcile --env dev`.
# Kustomize cannot build SOPS-encrypted YAML because apiVersion/kind/name are encrypted.

namespace: app

commonLabels:
  app.kubernetes.io/env: dev
