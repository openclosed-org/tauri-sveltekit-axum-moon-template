# Kustomization — Dev overlay
# Minimal resources, single replica, debug enabled
# Consumes Kubernetes Secrets reconciled separately from infra/security/sops.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Secrets are applied by `repo-tools secrets reconcile --env dev` before deploy.
# Kustomize cannot build SOPS-encrypted YAML because apiVersion/kind/name are encrypted.

namespace: app

commonLabels:
  app.kubernetes.io/env: dev

patches:
  # ── Relax resource limits for dev ──────────────────────────
  - target:
      kind: Deployment
      name: web-bff
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/envFrom/-
        value:
          secretRef:
            name: counter-shared-db-secrets
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits
        value:
          cpu: "1"
          memory: 1Gi

  - target:
      kind: Deployment
      name: web-server
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits
        value:
          cpu: "500m"
          memory: 512Mi

  # ── Update ingress hosts for dev ───────────────────────────
  - target:
      kind: Ingress
      name: app-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.local
      - op: replace
        path: /spec/rules/1/host
        value: app.dev.local
      - op: replace
        path: /spec/rules/2/host
        value: dev.local
