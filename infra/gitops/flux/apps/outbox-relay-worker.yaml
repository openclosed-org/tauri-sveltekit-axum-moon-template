# Flux Application Definition — Outbox Relay Worker
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: outbox-relay-worker
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra/k3s/overlays/dev/outbox-relay-worker
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true
  retryInterval: 2m0s
  maxRetries: 3

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: outbox-relay-worker
      namespace: app

  dependsOn:
    - name: infrastructure
      namespace: flux-system

  postBuild:
    substitute:
      ENV: dev

  targetNamespace: app
