# Flux Application Definition — Staging Outbox Relay Worker
#
# Reconciles the staging outbox-relay-worker overlay.
# Deploys after infrastructure and secrets are provisioned.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-outbox-relay-worker
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra/k3s/overlays/staging/outbox-relay-worker
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true
  retryInterval: 2m0s
  maxRetries: 3

  decryption:
    provider: sops
    secretRef:
      name: sops-age

  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: outbox-relay-worker
      namespace: app

  dependsOn:
    - name: infrastructure
      namespace: flux-system

  postBuild:
    substitute:
      ENV: staging

  targetNamespace: app
