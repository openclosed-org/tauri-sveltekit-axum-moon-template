# Network Policy — Default deny + explicit allow rules
#
# This policy implements:
#   1. Default deny all ingress/egress traffic within the namespace
#   2. Allow ingress to api-server from ingress controller (Traefik)
#   3. Allow ingress to web-server from ingress controller (Traefik)
#   4. Allow api-server to egress to external services (DB, OIDC, etc.)
#   5. Allow DNS resolution for all pods
#
# Apply: kubectl apply -f infra/security/policies/network-policy.yaml

---
# ── Default deny all ingress ──────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ── Default deny all egress ───────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# ── Allow DNS resolution for all pods ────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ── Allow Traefik ingress to api-server ──────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-server
  policyTypes:
    - Ingress
  ingress:
    # Allow from Traefik ingress controller (k3s namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 3001

---
# ── Allow Traefik ingress to web-server ──────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 80

---
# ── Allow api-server egress to external services ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-egress
  namespace: app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-server
  policyTypes:
    - Egress
  egress:
    # Allow DNS (handled by separate rule, but explicit for clarity)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow all external egress (DB, OIDC, SMTP, etc.)
    # In production, restrict to specific CIDRs/IPs
    - to: []
