# secrets.enc.yaml — Encrypted secrets template
#
# This file should be encrypted with SOPS before committing:
#   sops --encrypt --in-place infra/security/sops/secrets.enc.yaml
#
# To edit:
#   sops infra/security/sops/secrets.enc.yaml
#
# Structure follows Kubernetes Secret format.
# Values are base64-encoded when applied to k8s secrets.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
type: Opaque
stringData:
  # ── Authentication ──────────────────────────────────────────
  APP_AUTH__JWT_SECRET: "change-me-in-production-use-sops"
  APP_AUTH__JWT_PRIVATE_KEY: ""
  APP_AUTH__JWT_PUBLIC_KEY: ""

  # ── Database ────────────────────────────────────────────────
  APP_DATABASE__ENCRYPTION_KEY: ""

  # ── External Services ───────────────────────────────────────
  APP_EXTERNAL__OPENAI_API_KEY: ""
  APP_EXTERNAL__STRIPE_SECRET_KEY: ""

  # ── Email (OIDC / Magic Links) ─────────────────────────────
  APP_EMAIL__SMTP_HOST: ""
  APP_EMAIL__SMTP_PORT: "587"
  APP_EMAIL__SMTP_USER: ""
  APP_EMAIL__SMTP_PASSWORD: ""

  # ── OIDC Providers ──────────────────────────────────────────
  APP_OIDC__GOOGLE_CLIENT_ID: ""
  APP_OIDC__GOOGLE_CLIENT_SECRET: ""
  APP_OIDC__GITHUB_CLIENT_ID: ""
  APP_OIDC__GITHUB_CLIENT_SECRET: ""
