# Encrypted secrets template for Kubernetes
#
# This file should be encrypted using SOPS before committing to Git.
# To encrypt: sops --encrypt secrets.template.yaml > secrets.enc.yaml
#
# DO NOT COMMIT THIS FILE UNENCRYPTED!
# Use secrets.enc.yaml instead.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
type: Opaque
stringData:
  # ── Authentication ──────────────────────────────────────────
  JWT_SECRET: "change-me-jwt-secret"
  SESSION_TTL: "86400"  # 24 hours in seconds

  # ── Database ────────────────────────────────────────────────
  DATABASE_URL: "libsql://localhost:8080"
  DATABASE_PATH: "/data/app.db"

  # ── NATS Messaging ─────────────────────────────────────────
  NATS_URL: "nats://localhost:4222"

  # ── Cache/Redis ─────────────────────────────────────────────
  REDIS_URL: "redis://localhost:6379"

  # ── Object Storage (MinIO/S3) ──────────────────────────────
  S3_ENDPOINT: "http://localhost:9000"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  S3_BUCKET: "uploads"
  S3_REGION: "us-east-1"

  # ── OAuth Configuration ────────────────────────────────────
  OAUTH_CLIENT_ID: "change-me-oauth-client-id"
  OAUTH_CLIENT_SECRET: "change-me-oauth-client-secret"
  OAUTH_REDIRECT_URI: "http://localhost:3000/auth/callback"

  # ── Application Settings ───────────────────────────────────
  RUST_LOG: "info"
  APP_ENV: "development"
