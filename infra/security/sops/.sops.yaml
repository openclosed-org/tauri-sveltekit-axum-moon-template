# .sops.yaml — SOPS encryption rules
#
# SOPS (Secrets OPerationS) encrypts YAML/JSON/ENV secrets
# using age, PGP, or cloud KMS. We use age (lightweight, no dependencies).
#
# Setup:
#   1. Install: brew install age sops (macOS) or cargo install age + apt install sops
#   2. Generate key: age-keygen -o infra/security/sops/age.key
#   3. Copy public key into `recipients` below
#   4. Encrypt: sops --encrypt --in-place infra/security/sops/secrets.enc.yaml
#   5. Decrypt: sops --decrypt infra/security/sops/secrets.enc.yaml
#
# Usage in CI/CD:
#   - Store age.key as a CI secret
#   - Set SOPS_AGE_KEY_FILE to point to the key
#   - sops --decrypt will work automatically

creation_rules:
  # ── Production secrets ──────────────────────────────────────
  - path_regex: secrets\.enc\.yaml$
    age: >-
      # Replace with your actual age public key
      # age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      CHANGE_ME_REPLACE_WITH_YOUR_AGE_PUBLIC_KEY

  # ── Environment-specific secrets ────────────────────────────
  - path_regex: secrets\..*\.enc\.yaml$
    age: >-
      # Replace with your actual age public key
      CHANGE_ME_REPLACE_WITH_YOUR_AGE_PUBLIC_KEY

  # ── Dev secrets (less restrictive) ──────────────────────────
  - path_regex: secrets\.dev\.enc\.yaml$
    age: >-
      # Dev can use a different key or same key
      CHANGE_ME_REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
