# NATS — Message broker for event-driven architecture
#
# Provides: Pub/Sub messaging, JetStream for persistent messaging
# Port: 4222 (client), 8222 (monitoring)
#
# Usage in application:
#   NATS_URL=nats://nats.app.svc.cluster.local:4222

apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: app
  labels:
    app: nats
    component: messaging
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      protocol: TCP
    - name: monitoring
      port: 8222
      targetPort: 8222
      protocol: TCP
    - name: cluster
      port: 6222
      targetPort: 6222
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: app
  labels:
    app: nats
    component: messaging
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        component: messaging
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
            - containerPort: 6222
              name: cluster
          args:
            - "-js"  # Enable JetStream
            - "-m"
            - "8222"
            - "--store_dir=/data/jetstream"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: nats-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
