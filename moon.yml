# Moon Task Configuration
# 2026-04 Best Practices:
# - moon: dependency graphs, incremental caching, parallel execution
# - just: human-friendly aliases, precondition checks
# - scripts: TypeScript only (.ts), cross-platform via scripts/lib/spawn.ts

tasks:
  # ==========================================================================
  # BUILD TASKS
  # ==========================================================================

  build:
    command: 'cargo build --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:
      - '**/*.rs'

  format-fix:
    command: 'cargo fmt --all'
    inputs:
      - '**/*.rs'

  bloat:
    command: 'cargo bloat --release --crates -p web-bff'
    inputs:
      - 'Cargo.toml'

  # ==========================================================================
  # SETUP TASKS
  # ==========================================================================

  setup:
    script: 'bun install'
    inputs:
      - 'package.json'

  bootstrap:
    deps:
      - 'setup'
      - 'doctor'

  doctor:
    script: 'bun run scripts/doctor.ts'
    inputs:
      - '.mise.toml'
      - 'rust-toolchain.toml'
      - '.env.example'
      - 'scripts/doctor.ts'
      - 'scripts/lib/spawn.ts'

  toolchain-check:
    script: 'rustc --version && bun --version && moon --version && echo "ALL OK"'
    inputs:
      - 'rust-toolchain.toml'
      - '.mise.toml'

  # ==========================================================================
  # DEVELOPMENT TASKS
  # ==========================================================================

  dev-api:
    command: 'cargo run -p web-bff'
    deps:
      - 'check'
    inputs:
      - 'servers/bff/web-bff/**/*'

  # ==========================================================================
  # QUALITY GATE TASKS
  # ==========================================================================

  fmt:
    deps:
      - 'format'

  quality-lint:
    deps:
      - 'lint'

  typecheck:
    deps:
      - 'check'

  contracts-check:
    script: |
      echo "=== Checking contract drift BEFORE regeneration ==="
      if git diff --name-only packages/contracts/generated/ 2>/dev/null | grep -q .; then
        echo "DRIFT DETECTED: contracts changed but generated files not committed"
        echo "Run 'just typegen' then recommit the generated files"
        git diff --name-only packages/contracts/generated/
        exit 1
      else
        echo "DRIFT CHECK PASSED: packages/contracts/generated/"
      fi
      echo "=== No drift detected. Regenerating to verify alignment ==="
      moon run repo:typegen
      echo "=== Re-verifying post-regeneration ==="
      if git diff --name-only packages/contracts/generated/ 2>/dev/null | grep -q .; then
        echo "POST-REGEN DRIFT DETECTED: typegen produces different output"
        echo "Fix source contracts or typegen script"
        git diff --name-only packages/contracts/generated/
        exit 1
      else
        echo "POST-REGEN DRIFT CHECK PASSED"
      fi
      echo "=== All contract drift checks passed ==="
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  test-unit:
    deps:
      - 'test'

  test-nextest:
    command: 'cargo nextest run --workspace'

  test-coverage:
    command: 'cargo llvm-cov --workspace --lcov --output-path target/lcov.info'

  test-coverage-html:
    command: 'cargo llvm-cov --workspace --html --open'

  test-coverage-clean:
    command: 'cargo llvm-cov clean'

  clean-sweep:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['sweep', '--time', '7'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-sweep: cargo install cargo-sweep');
      "

  clean-sweep-deps:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['sweep', '--installed'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-sweep: cargo install cargo-sweep');
      "

  test-hack:
    command: 'cargo hack check --workspace --feature-powerset'

  test-mutants:
    command: 'cargo mutants --workspace'

  test-integration:
    command: 'cargo test --workspace -- --ignored'

  check-storage-turso:
    command: 'cargo check -p web-bff'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'servers/bff/web-bff/**/*'
      - 'packages/adapters/storage/turso/**/*'

  test-all-rust:
    deps:
      - 'test-nextest'
      - 'test-coverage'
      - 'test-hack'

  boundary-check:
    script: 'bun run scripts/boundary-check.ts'
    inputs:
      - 'Cargo.toml'
      - 'packages/*/Cargo.toml'
      - 'packages/**/Cargo.toml'
      - 'servers/*/Cargo.toml'
      - 'scripts/boundary-check.ts'
      - 'scripts/lib/spawn.ts'
    deps:
      - '~:setup'
    options:
      runFromWorkspaceRoot: true

  # ==========================================================================
  # GATE TASKS (default verification coverage)
  # ==========================================================================

  gate-existence:
    script: 'just gate-existence strict'

  validate-state:
    script: 'just validate-state strict'

  validate-workflows:
    script: 'just validate-workflows strict'

  verify-replay:
    script: 'just verify-replay strict'

  # Main quality gate (runs all checks in parallel where possible)
  # Covers: fmt, lint, typecheck, contracts, unit tests, boundary, and
  # the default event-chain gates (existence, state, workflows, replay).
  verify:
    deps:
      - 'fmt'
      - 'quality-lint'
      - 'typecheck'
      - 'contracts-check'
      - 'test-unit'
      - '~:boundary-check'
      - '~:gate-existence'
      - '~:validate-state'
      - '~:validate-workflows'
      - '~:verify-replay'

  # ==========================================================================
  # CODEGEN TASKS
  # ==========================================================================

  typegen:
    script: 'bun run scripts/typegen.ts'
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'
      - 'scripts/typegen.ts'
      - 'scripts/lib/spawn.ts'

  # ==========================================================================
  # SECURITY TASKS
  # ==========================================================================

  audit-rust:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['audit'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-audit: cargo install cargo-audit');
      "

  audit-bun:
    script: 'bun audit || true'
