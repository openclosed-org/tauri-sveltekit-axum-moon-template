tasks:
  build:
    command: 'cargo build'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
    platform: 'system'

  check:
    command: 'cargo check'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
    platform: 'system'

  format:
    command: 'cargo fmt --all'
    inputs:
      - '@globs(sources)'
    platform: 'system'

  # Aggregate tasks — run lint/test across all packages in parallel
  lint:
    deps:
      - 'desktop-ui:lint'
      - 'shared_contracts:lint'
      - 'domain:lint'
      - 'application:lint'
      - 'runtime_server:check'
    platform: 'system'

  test:
    deps:
      - 'desktop-ui:check'
      - 'shared_contracts:test'
      - 'domain:test'
      - 'application:test'
      - 'runtime_server:check'
    platform: 'system'

  # Binary size monitoring (per D-05)
  bloat:
    command: 'cargo bloat --release --crates -p runtime_server'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
    platform: 'system'
