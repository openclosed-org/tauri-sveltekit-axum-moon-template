tasks:
  build:
    command: 'cargo build --workspace'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace -- -D warnings'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:
      - '@globs(sources)'

  format-fix:
    command: 'cargo fmt --all'
    inputs:
      - '@globs(sources)'

  lint-all:
    deps:
      - 'lint'
      - 'apps~client~web~app:lint'

  check-all:
    deps:
      - 'check'
      - 'apps~client~web~app:check'
      - 'apps~client~web~app:lint'

  test-all:
    deps:
      - 'test'
      - 'apps~client~web~app:check'

  bloat:
    command: 'cargo bloat --release --crates -p runtime_server'
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
