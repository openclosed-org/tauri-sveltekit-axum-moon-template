# ── Cargo tasks (existing, preserved for backward compatibility) ──────
tasks:
  build:
    command: 'cargo build --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace -- -D warnings'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:


  format-fix:
    command: 'cargo fmt --all'
    inputs:


  bloat:
    command: 'cargo bloat --release --crates -p runtime_server'
    inputs:

      - 'Cargo.toml'

  # ── Setup ──────────────────────────────────────────────────────────
  setup:
    script: 'bun install && proto install'
    inputs:
      - 'package.json'
      - '.prototools'

  bootstrap:
    deps:
      - 'setup'
      - 'doctor'

  doctor:
    script: |
      echo "=== Toolchain Check ==="
      bun --version || echo "MISSING: bun"
      node --version || echo "MISSING: node"
      cargo --version || echo "MISSING: cargo"
      rustc --version || echo "MISSING: rustc"
      moon --version || echo "MISSING: moon"
      echo "=== Proto Status ==="
      proto status 2>/dev/null || echo "proto not installed"
      echo "=== Env Check ==="
      test -f .env && echo ".env exists" || echo "MISSING: .env"
      echo "DONE"
    inputs:
      - '.prototools'
      - 'rust-toolchain.toml'
      - '.env.example'

  toolchain-check:
    script: 'rustc --version && bun --version && moon --version && echo "ALL OK"'
    inputs:
      - 'rust-toolchain.toml'
      - '.prototools'

  # ── Dev ────────────────────────────────────────────────────────────
  dev-web:
    script: 'cd apps/client/web/app && bun run dev'
    inputs:
      - 'apps/client/web/app/**/*'

  dev-desktop:
    script: 'cd apps/client/native/src-tauri && cargo tauri dev'
    deps:
      - 'dev-api'
    inputs:
      - 'apps/client/native/**/*'

  dev-api:
    command: 'cargo run -p runtime_server'
    deps:
      - 'check'
    inputs:
      - 'servers/api/**/*'

  dev-extension:
    command: 'echo "Extension dev not yet implemented"'

  dev-workers:
    command: 'echo "Workers dev not yet implemented"'

  dev-fullstack:
    deps:
      - 'dev-api'
      - 'dev-web'

  # ── Quality ────────────────────────────────────────────────────────
  fmt:
    deps:
      - 'format'
      - 'client-web:format'

  quality-lint:
    deps:
      - 'lint'
      - 'client-web:lint'

  typecheck:
    deps:
      - 'check'
      - 'client-web:check'

  contracts-check:
    script: |
      echo "=== Running typegen ==="
      moon run repo:typegen
      echo "=== Checking for drift ==="
      git diff --exit-code packages/contracts/generated/ && echo "DRIFT CHECK PASSED" || (echo "DRIFT CHECK FAILED — generated types differ from committed" && exit 1)
      git diff --exit-code apps/client/web/app/src/lib/generated/ && echo "FRONTEND SYNC PASSED" || (echo "FRONTEND SYNC FAILED — frontend types differ from committed" && exit 1)
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  test-unit:
    deps:
      - 'test'

  test-integration:
    command: 'cargo test --workspace -- --ignored'

  test-e2e:
    script: 'cd apps/client/web/app && bun run test:e2e'

  test-agent:
    command: 'echo "Agent tests — Phase 5 implementation"'

  verify:
    deps:
      - 'fmt'
      - 'quality-lint'
      - 'typecheck'
      - 'contracts-check'
      - 'test-unit'

  # ── Codegen ────────────────────────────────────────────────────────
  typegen:
    script: |
      cargo test -p contracts_api -p contracts_auth -p contracts_events 2>&1 || true
      rm -rf packages/contracts/generated/api packages/contracts/generated/auth packages/contracts/generated/events
      cp -r packages/contracts/api/bindings/api packages/contracts/generated/api 2>/dev/null || true
      cp -r packages/contracts/auth/bindings/auth packages/contracts/generated/auth 2>/dev/null || true
      cp -r packages/contracts/events/bindings/events packages/contracts/generated/events 2>/dev/null || true
      echo "=== Syncing to frontend ==="
      mkdir -p apps/client/web/app/src/lib/generated
      cp -r packages/contracts/generated/* apps/client/web/app/src/lib/generated/ 2>/dev/null || true
      echo "=== Typegen complete ==="
      ls -la apps/client/web/app/src/lib/generated/ 2>/dev/null || echo "No generated files yet"
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  openapi-gen:
    command: 'echo "OpenAPI gen — Phase 2 implementation"'

  fixtures-gen:
    command: 'echo "Fixtures gen — Phase 5 implementation"'

  icons-gen:
    command: 'echo "Icons gen — as needed"'

  tokens-gen:
    command: 'echo "Tokens gen — as needed"'

  # ── Ops ────────────────────────────────────────────────────────────
  trace-open:
    command: 'echo "Trace open — Phase 7 implementation"'

  evals-run:
    command: 'echo "Evals run — Phase 5 implementation"'

  replay-protocol:
    command: 'echo "Replay protocol — Phase 7 implementation"'

  release-dry-run:
    command: 'echo "Release dry run — Phase 9 implementation"'

  release-desktop:
    command: 'echo "Release desktop — Phase 9 implementation"'

  release-web:
    command: 'echo "Release web — Phase 9 implementation"'

  release-server:
    command: 'echo "Release server — Phase 9 implementation"'

  # ── Security ───────────────────────────────────────────────────────
  audit-rust:
    script: 'cargo audit 2>/dev/null || echo "Install cargo-audit: cargo install cargo-audit"'

  audit-bun:
    script: 'bun audit || true'

  secrets-scan:
    command: 'echo "Secrets scan — use gitleaks or similar"'

  licenses-check:
    command: 'echo "Licenses check — Phase 9 implementation"'
