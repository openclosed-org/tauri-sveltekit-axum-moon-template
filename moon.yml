# Moon Task Configuration
# 2026-04 Best Practices:
# - moon: dependency graphs, incremental caching, parallel execution
# - just: human-friendly aliases, precondition checks
# - scripts: Rust CLI via tools/repo-tools

tasks:
  # ==========================================================================
  # BUILD TASKS
  # ==========================================================================

  build:
    command: 'cargo build --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:
      - '**/*.rs'

  format-fix:
    command: 'cargo fmt --all'
    inputs:
      - '**/*.rs'

  bloat:
    command: 'cargo bloat --release --crates -p web-bff'
    inputs:
      - 'Cargo.toml'

  # ==========================================================================
  # SETUP TASKS
  # ==========================================================================

  setup:
    command: 'cargo run -p repo-tools -- doctor'
    inputs:
      - '.mise.toml'
      - 'rust-toolchain.toml'
      - '.env.example'
      - 'tools/repo-tools/src/**'

  bootstrap:
    deps:
      - 'setup'
      - 'doctor'

  doctor:
    command: 'cargo run -p repo-tools -- doctor'
    inputs:
      - '.mise.toml'
      - 'rust-toolchain.toml'
      - '.env.example'
      - 'tools/repo-tools/src/**'

  toolchain-check:
    script: 'rustc --version && moon --version && echo "ALL OK"'
    inputs:
      - 'rust-toolchain.toml'
      - '.mise.toml'

  # ==========================================================================
  # DEVELOPMENT TASKS
  # ==========================================================================

  dev-api:
    command: 'cargo run -p web-bff'
    deps:
      - 'check'
    inputs:
      - 'servers/bff/web-bff/**/*'

  # ==========================================================================
  # QUALITY GATE TASKS
  # ==========================================================================

  fmt:
    deps:
      - 'format'

  quality-lint:
    deps:
      - 'lint'

  typecheck:
    deps:
      - 'check'

  verify-contracts:
    command: 'cargo run -p repo-tools -- validate-contracts --mode warn'
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  test-unit:
    deps:
      - 'test'

  test-nextest:
    command: 'cargo nextest run --workspace'

  test-coverage:
    command: 'cargo llvm-cov --workspace --lcov --output-path target/lcov.info'

  test-coverage-html:
    command: 'cargo llvm-cov --workspace --html --open'

  test-coverage-clean:
    command: 'cargo llvm-cov clean'

  clean-sweep:
    command: 'cargo run -p repo-tools -- clean-sweep'

  clean-sweep-deps:
    command: 'cargo run -p repo-tools -- clean-sweep-deps'

  test-hack:
    command: 'cargo hack check --workspace --feature-powerset'

  test-mutants:
    command: 'cargo mutants --workspace'

  test-integration:
    command: 'cargo test --workspace -- --ignored'

  check-storage-turso:
    command: 'cargo check -p web-bff'
    inputs:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'servers/bff/web-bff/**/*'
      - 'packages/adapters/storage/turso/**/*'

  test-all-rust:
    deps:
      - 'test-nextest'
      - 'test-coverage'
      - 'test-hack'

  boundary-check:
    command: 'cargo run -p repo-tools -- boundary-check'
    inputs:
      - 'Cargo.toml'
      - 'packages/*/Cargo.toml'
      - 'packages/**/Cargo.toml'
      - 'servers/*/Cargo.toml'
      - 'tools/repo-tools/src/**'
    deps:
      - '~:setup'
    options:
      runFromWorkspaceRoot: true

  # ==========================================================================
  # GATE TASKS (default verification coverage)
  # ==========================================================================

  gate-existence:
    script: 'just gate-existence strict'

  validate-state:
    script: 'just validate-state strict'

  validate-workflows:
    script: 'just validate-workflows strict'

  verify-replay:
    script: 'just verify-replay strict'

  # Main quality gate (runs all checks in parallel where possible)
  # Covers: fmt, lint, typecheck, contracts, unit tests, boundary, and
  # the default event-chain gates (existence, state, workflows, replay).
  verify:
    deps:
      - 'fmt'
      - 'quality-lint'
      - 'typecheck'
      - 'verify-contracts'
      - 'test-unit'
      - '~:boundary-check'
      - '~:gate-existence'
      - '~:validate-state'
      - '~:validate-workflows'
      - '~:verify-replay'

  # ==========================================================================
  # CODEGEN TASKS
  # ==========================================================================

  typegen:
    command: 'cargo run -p repo-tools -- typegen'
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'
      - 'tools/repo-tools/src/**'

  # ==========================================================================
  # SECURITY TASKS
  # ==========================================================================

  audit-rust:
    command: 'cargo run -p repo-tools -- audit-rust'

  audit-bun:
    script: 'bun audit || true'
