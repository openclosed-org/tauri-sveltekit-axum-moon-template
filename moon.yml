# ── Cargo tasks (existing, preserved for backward compatibility) ──────
tasks:
  build:
    command: 'cargo build --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:


  format-fix:
    command: 'cargo fmt --all'
    inputs:


  bloat:
    command: 'cargo bloat --release --crates -p runtime_server'
    inputs:

      - 'Cargo.toml'

  # ── Setup ──────────────────────────────────────────────────────────
  setup:
    script: 'bun install'
    inputs:
      - 'package.json'

  bootstrap:
    deps:
      - 'setup'
      - 'doctor'

  doctor:
    script: 'bun run scripts/doctor.mjs'
    inputs:
      - '.tool-versions'
      - 'rust-toolchain.toml'
      - '.env.example'
      - 'scripts/doctor.mjs'

  toolchain-check:
    script: 'rustc --version && bun --version && moon --version && echo "ALL OK"'
    inputs:
      - 'rust-toolchain.toml'
      - '.tool-versions'

  # ── Dev ────────────────────────────────────────────────────────────
  dev-web:
    script: 'cd apps/client/web/app && bun run dev'
    inputs:
      - 'apps/client/web/app/**/*'

  dev-desktop:
    script: 'bun run scripts/dev-desktop.mjs'
    inputs:
      - 'apps/client/native/**/*'
      - 'servers/api/**/*'
      - 'scripts/dev-desktop.mjs'

  dev-desktop-win:
    script: 'bun run scripts/dev-desktop.mjs'
    inputs:
      - 'apps/client/native/**/*'
      - 'servers/api/**/*'
      - 'scripts/dev-desktop.mjs'

  dev-api:
    command: 'cargo run -p runtime_server'
    deps:
      - 'check'
    inputs:
      - 'servers/api/**/*'

  dev-extension:
    command: 'echo "Extension dev not yet implemented"'

  dev-workers:
    command: 'echo "Workers dev not yet implemented"'

  dev-fullstack:
    deps:
      - 'dev-api'
      - 'dev-web'

  # ── Quality ────────────────────────────────────────────────────────
  fmt:
    deps:
      - 'format'
      - 'client-web:format'

  quality-lint:
    deps:
      - 'lint'
      - 'client-web:lint'

  typecheck:
    deps:
      - 'check'
      - 'client-web:check'

  contracts-check:
    script: |
      echo "=== Running typegen ==="
      moon run repo:typegen
      echo "=== Checking for drift ==="
      git diff --exit-code packages/contracts/generated/ && echo "DRIFT CHECK PASSED" || (echo "DRIFT CHECK FAILED — generated types differ from committed" && exit 1)
      git diff --exit-code apps/client/web/app/src/lib/generated/ && echo "FRONTEND SYNC PASSED" || (echo "FRONTEND SYNC FAILED — frontend types differ from committed" && exit 1)
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  test-unit:
    deps:
      - 'test'

  test-nextest:
    command: 'cargo nextest run --workspace'

  test-coverage:
    command: 'cargo llvm-cov --workspace --lcov --output-path target/lcov.info'

  test-coverage-html:
    command: 'cargo llvm-cov --workspace --html --open'

  test-coverage-clean:
    command: 'cargo llvm-cov clean'

  clean-sweep:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['sweep', '--time', '7'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-sweep: cargo install cargo-sweep');
      "

  clean-sweep-deps:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['sweep', '--installed'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-sweep: cargo install cargo-sweep');
      "

  test-hack:
    command: 'cargo hack check --workspace --feature-powerset'

  test-mutants:
    command: 'cargo mutants --workspace'

  test-integration:
    command: 'cargo test --workspace -- --ignored'

  test-e2e:
    script: 'cd apps/client/web/app && bun run test:e2e'

  test-desktop:
    script: 'cd e2e-desktop-playwright && bun run test:desktop:core'
    inputs:
      - 'e2e-desktop-playwright/**/*.ts'
      - 'e2e-desktop-playwright/package.json'
      - 'apps/client/native/**/*'
      - 'apps/client/web/app/**/*'
    deps:
      - '~:setup'

  test-e2e-full:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');

        const lanes = [
          { name: 'Web Playwright E2E matrix', cwd: 'apps/client/web/app', cmd: process.platform === 'win32' ? 'bun.cmd' : 'bun', args: ['run', 'test:e2e'] },
          { name: 'Tauri Playwright desktop E2E (CI)', cwd: 'e2e-desktop-playwright', cmd: process.platform === 'win32' ? 'bun.cmd' : 'bun', args: ['run', 'test:ci'] },
        ];

        const results = [];

        for (const lane of lanes) {
          console.log('=== ' + lane.name + ' ===');
          const run = spawnSync(lane.cmd, lane.args, {
            cwd: lane.cwd,
            stdio: 'inherit',
            shell: false,
          });
          results.push({ name: lane.name, code: run.status ?? 1 });
        }

        console.log('\n=== E2E Full Gate Summary ===');
        let hasFailure = false;
        for (const result of results) {
          const ok = result.code === 0;
          if (!ok) hasFailure = true;
          console.log((ok ? '[PASS] ' : '[FAIL] ') + result.name + ' (exit ' + result.code + ')');
        }

        process.exit(hasFailure ? 1 : 0);
      "
    inputs:
      - 'apps/client/web/app/**'
      - 'e2e-desktop-playwright/**'

  test-agent:
    command: 'echo "Agent tests — Phase 5 implementation"'

  test-all-rust:
    deps:
      - 'test-nextest'
      - 'test-coverage'
      - 'test-hack'

  test-all-frontend:
    deps:
      - 'client-web:check'
      - 'client-web:lint'
      - 'test-e2e'
      - 'test-desktop'

  boundary-check:
    script: 'bun run scripts/boundary-check.mjs'
    inputs:
      - "Cargo.toml"
      - "packages/*/Cargo.toml"
      - "packages/**/Cargo.toml"
      - "servers/*/Cargo.toml"
      - "scripts/boundary-check.mjs"
    deps:
      - "~:setup"
    options:
      runFromWorkspaceRoot: true

  verify:
    deps:
      - 'fmt'
      - 'quality-lint'
      - 'typecheck'
      - 'contracts-check'
      - 'test-unit'
      - '~:boundary-check'

  # ── Codegen ────────────────────────────────────────────────────────
  typegen:
    script: 'bun run scripts/typegen.mjs'
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'
      - 'scripts/typegen.mjs'

  openapi-gen:
    command: 'echo "OpenAPI gen — Phase 2 implementation"'

  fixtures-gen:
    command: 'echo "Fixtures gen — Phase 5 implementation"'

  icons-gen:
    command: 'echo "Icons gen — as needed"'

  tokens-gen:
    command: 'echo "Tokens gen — as needed"'

  # ── Ops ────────────────────────────────────────────────────────────
  trace-open:
    command: 'echo "Trace open — Phase 7 implementation"'

  evals-run:
    command: 'echo "Evals run — Phase 5 implementation"'

  replay-protocol:
    command: 'echo "Replay protocol — Phase 7 implementation"'

  release-dry-run:
    command: 'echo "Release dry run — Phase 9 implementation"'

  release-desktop:
    command: 'echo "Release desktop — Phase 9 implementation"'

  release-web:
    command: 'echo "Release web — Phase 9 implementation"'

  release-server:
    command: 'echo "Release server — Phase 9 implementation"'

  # ── Security ───────────────────────────────────────────────────────
  audit-rust:
    script: |
      bun -e "
        const { spawnSync } = require('child_process');
        const r = spawnSync('cargo', ['audit'], { stdio: 'inherit', shell: process.platform === 'win32' });
        if (r.status !== 0) console.log('Install cargo-audit: cargo install cargo-audit');
      "

  audit-bun:
    script: 'bun audit || true'

  secrets-scan:
    command: 'echo "Secrets scan — use gitleaks or similar"'

  licenses-check:
    command: 'echo "Licenses check — Phase 9 implementation"'
