# ── Cargo tasks (existing, preserved for backward compatibility) ──────
tasks:
  build:
    command: 'cargo build --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  check:
    command: 'cargo check --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  lint:
    command: 'cargo clippy --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    command: 'cargo test --workspace'
    inputs:

      - 'Cargo.toml'
      - 'Cargo.lock'

  format:
    command: 'cargo fmt --all -- --check'
    inputs:


  format-fix:
    command: 'cargo fmt --all'
    inputs:


  bloat:
    command: 'cargo bloat --release --crates -p runtime_server'
    inputs:

      - 'Cargo.toml'

  # ── Setup ──────────────────────────────────────────────────────────
  setup:
    script: 'bun install'
    inputs:
      - 'package.json'

  bootstrap:
    deps:
      - 'setup'
      - 'doctor'

  doctor:
    script: |
      echo "=== Toolchain Check ==="
      bun --version || echo "MISSING: bun — run: mise install"
      node --version || echo "MISSING: node — run: mise install"
      cargo --version || echo "MISSING: cargo — run: mise install"
      rustc --version || echo "MISSING: rustc — run: mise install"
      moon --version || echo "MISSING: moon"
      echo "=== Env Check ==="
      test -f .env && echo ".env exists" || echo "MISSING: .env"
      echo "=== Done ==="
    inputs:
      - '.tool-versions'
      - 'rust-toolchain.toml'
      - '.env.example'

  toolchain-check:
    script: 'rustc --version && bun --version && moon --version && echo "ALL OK"'
    inputs:
      - 'rust-toolchain.toml'
      - '.tool-versions'

  # ── Dev ────────────────────────────────────────────────────────────
  dev-web:
    script: 'cd apps/client/web/app && bun run dev'
    inputs:
      - 'apps/client/web/app/**/*'

  dev-desktop:
    script: |
      # Start Axum API server in background
      cargo run -p runtime_server &
      API_PID=$!

      # Wait for API server to be ready
      echo "Waiting for API server..."
      for i in $(seq 1 30); do
        if rtk nc -z localhost 3001 2>/dev/null; then
          echo "API server ready on port 3001"
          break
        fi
        sleep 1
      done

      # Start Tauri dev (blocking)
      cd apps/client/native/src-tauri && cargo tauri dev
      Tauri_EXIT=$?

      # Cleanup API server
      kill $API_PID 2>/dev/null
      exit $Tauri_EXIT
    inputs:
      - 'apps/client/native/**/*'
      - 'servers/api/**/*'

  dev-api:
    command: 'cargo run -p runtime_server'
    deps:
      - 'check'
    inputs:
      - 'servers/api/**/*'

  dev-extension:
    command: 'echo "Extension dev not yet implemented"'

  dev-workers:
    command: 'echo "Workers dev not yet implemented"'

  dev-fullstack:
    deps:
      - 'dev-api'
      - 'dev-web'

  # ── Quality ────────────────────────────────────────────────────────
  fmt:
    deps:
      - 'format'
      - 'client-web:format'

  quality-lint:
    deps:
      - 'lint'
      - 'client-web:lint'

  typecheck:
    deps:
      - 'check'
      - 'client-web:check'

  contracts-check:
    script: |
      echo "=== Running typegen ==="
      moon run repo:typegen
      echo "=== Checking for drift ==="
      git diff --exit-code packages/contracts/generated/ && echo "DRIFT CHECK PASSED" || (echo "DRIFT CHECK FAILED — generated types differ from committed" && exit 1)
      git diff --exit-code apps/client/web/app/src/lib/generated/ && echo "FRONTEND SYNC PASSED" || (echo "FRONTEND SYNC FAILED — frontend types differ from committed" && exit 1)
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  test-unit:
    deps:
      - 'test'

  test-nextest:
    command: 'cargo nextest run --workspace'

  test-coverage:
    command: 'cargo llvm-cov --workspace --lcov --output-path target/lcov.info'

  test-coverage-html:
    command: 'cargo llvm-cov --workspace --html --open'

  test-coverage-clean:
    command: 'cargo llvm-cov clean'

  clean-sweep:
    script: 'cargo sweep --time 7 2>/dev/null || echo "Install cargo-sweep: cargo install cargo-sweep"'

  clean-sweep-deps:
    script: 'cargo sweep --installed 2>/dev/null || echo "Install cargo-sweep: cargo install cargo-sweep"'

  test-hack:
    command: 'cargo hack check --workspace --feature-powerset'

  test-mutants:
    command: 'cargo mutants --workspace'

  test-integration:
    command: 'cargo test --workspace -- --ignored'

  test-e2e:
    script: 'cd apps/client/web/app && bun run test:e2e'

  test-desktop:
    script: 'cd e2e-tests && bun run test'

  test-agent:
    command: 'echo "Agent tests — Phase 5 implementation"'

  test-all-rust:
    deps:
      - 'test-nextest'
      - 'test-coverage'
      - 'test-hack'

  test-all-frontend:
    deps:
      - 'client-web:check'
      - 'client-web:lint'
      - 'test-e2e'
      - 'test-desktop'

  boundary-check:
    command:
      - 'echo "=== Checking domain dependencies ==="'
      - 'cargo tree -p domain --depth 1 2>/dev/null | grep -v "domain" | grep -v "^\s*$" | grep -v "async-trait" | grep -v "serde" | grep -v "serde_json" | grep -E "(storage_|runtime_|contracts_)" && echo "FAIL: domain depends on illegal crate" && exit 1 || echo "OK: domain boundary clean"'
      - 'echo "=== Checking usecases dependencies ==="'
      - 'cargo tree -p usecases --depth 1 2>/dev/null | grep -v "usecases" | grep -v "^\s*$" | grep -v "async-trait" | grep -v "serde" | grep -v "serde_json" | grep -v "chrono" | grep -v "thiserror" | grep -E "(storage_|runtime_|contracts_)" && echo "FAIL: usecases depends on illegal crate" && exit 1 || echo "OK: usecases boundary clean"'
      - 'echo "=== Checking contracts_api dependencies ==="'
      - 'cargo tree -p contracts_api --depth 1 2>/dev/null | grep -v "contracts_api" | grep -v "^\s*$" | grep -v "serde" | grep -v "ts-rs" | grep -v "utoipa" | grep -v "validator" | grep -E "(domain|usecases|storage_|runtime_)" && echo "FAIL: contracts_api depends on illegal crate" && exit 1 || echo "OK: contracts_api boundary clean"'
      - 'echo "All boundary checks passed"'
    inputs:
      - "Cargo.toml"
      - "packages/*/Cargo.toml"
      - "packages/**/Cargo.toml"
      - "servers/*/Cargo.toml"
    deps:
      - "~:setup"
    options:
      runFromWorkspaceRoot: true

  verify:
    deps:
      - 'fmt'
      - 'quality-lint'
      - 'typecheck'
      - 'contracts-check'
      - 'test-unit'
      - '~:boundary-check'

  # ── Codegen ────────────────────────────────────────────────────────
  typegen:
    script: |
      cargo test -p contracts_api -p contracts_auth -p contracts_events 2>&1 || true
      rm -rf packages/contracts/generated/api packages/contracts/generated/auth packages/contracts/generated/events
      cp -r packages/contracts/api/bindings/api packages/contracts/generated/api 2>/dev/null || true
      cp -r packages/contracts/auth/bindings/auth packages/contracts/generated/auth 2>/dev/null || true
      cp -r packages/contracts/events/bindings/events packages/contracts/generated/events 2>/dev/null || true
      echo "=== Syncing to frontend ==="
      mkdir -p apps/client/web/app/src/lib/generated
      cp -r packages/contracts/generated/* apps/client/web/app/src/lib/generated/ 2>/dev/null || true
      echo "=== Typegen complete ==="
      ls -la apps/client/web/app/src/lib/generated/ 2>/dev/null || echo "No generated files yet"
    inputs:
      - 'packages/contracts/**/src/**'
      - 'packages/contracts/**/Cargo.toml'

  openapi-gen:
    command: 'echo "OpenAPI gen — Phase 2 implementation"'

  fixtures-gen:
    command: 'echo "Fixtures gen — Phase 5 implementation"'

  icons-gen:
    command: 'echo "Icons gen — as needed"'

  tokens-gen:
    command: 'echo "Tokens gen — as needed"'

  # ── Ops ────────────────────────────────────────────────────────────
  trace-open:
    command: 'echo "Trace open — Phase 7 implementation"'

  evals-run:
    command: 'echo "Evals run — Phase 5 implementation"'

  replay-protocol:
    command: 'echo "Replay protocol — Phase 7 implementation"'

  release-dry-run:
    command: 'echo "Release dry run — Phase 9 implementation"'

  release-desktop:
    command: 'echo "Release desktop — Phase 9 implementation"'

  release-web:
    command: 'echo "Release web — Phase 9 implementation"'

  release-server:
    command: 'echo "Release server — Phase 9 implementation"'

  # ── Security ───────────────────────────────────────────────────────
  audit-rust:
    script: 'cargo audit 2>/dev/null || echo "Install cargo-audit: cargo install cargo-audit"'

  audit-bun:
    script: 'bun audit || true'

  secrets-scan:
    command: 'echo "Secrets scan — use gitleaks or similar"'

  licenses-check:
    command: 'echo "Licenses check — Phase 9 implementation"'
