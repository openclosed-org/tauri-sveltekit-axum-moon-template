# Nextest configuration — modern Rust test runner
# Docs: https://nexte.st/docs/configuration/

[profile.default]
# Retry flaky tests once
retries = { backoff = "exponential", count = 1, delay = "1s", jitter = true }

# Time out slow tests after 5 minutes
slow-timeout = { period = "30s", terminate-after = 10 }

# Show test output for failures
success-output = "immediate-final"
failure-output = "immediate"

# Number of threads (auto-detect)
test-threads = "num-cpus"

[profile.ci]
# More aggressive timeouts for CI
retries = 0
slow-timeout = { period = "60s", terminate-after = 5 }
success-output = "fail"
failure-output = "immediate"

[[profile.default.overrides]]
# Integration tests may need more time
filter = 'test(test::integration)'
slow-timeout = { period = "60s", terminate-after = 15 }
