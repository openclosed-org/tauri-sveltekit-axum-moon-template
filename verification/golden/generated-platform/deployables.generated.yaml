- name: counter-service
  type: server
  version: 1.0.0
  description: |
    Reference counter service capability. Currently hosted inside web-bff; target state keeps an independent deployable boundary for topology evolution. Hosts the counter aggregate with CAS versioning, idempotency cache, and unified event outbox.
  current_status: embedded
  target_status: independent
  planned_capabilities:
  - standalone HTTP process for counter-only deployment
  - dedicated counter service scaling separate from web-bff
  services:
  - counter-service
  resources:
  - turso
  ports:
  - 3010
- name: edge-gateway
  type: gateway
  version: 1.0.0
  description: |
    Reverse proxy and edge gateway (Pingora-based). Currently handles local health/readiness and path-based routing to web-bff and the web upstream. Target state may add edge security and traffic controls.
  current_status: implemented
  target_status: independent
  planned_capabilities:
  - TLS termination
  - rate limiting
  - authentication passthrough
  - multi-backend load balancing policy
  services: []
  resources: []
  ports:
  - 80
  - 443
- name: indexer-worker
  type: worker
  version: 0.1.0
  description: |
    Full-text search indexer. Consumes events from the message broker, transforms domain entities into search documents, and writes to the search index. Supports incremental indexing with source-level checkpoint tracking.
  current_status: stub
  target_status: independent
  planned_capabilities:
  - durable indexing pipeline beyond current stub implementation
  services: []
  resources:
  - nats
  ports:
  - 3040
- name: outbox-relay-worker
  type: relay
  version: 1.0.0
  description: |
    Reference outbox relay worker. Polls pending outbox records, publishes them to the message backbone, and records delivery progress.
  current_status: implemented
  target_status: independent
  services: []
  resources:
  - turso
  - nats
  ports:
  - 3030
- name: projector-worker
  type: projector
  version: 0.1.0
  description: |
    Reference event-driven projector. Consumes domain events and builds denormalized read models that must remain replayable and rebuildable.
  current_status: implemented
  target_status: independent
  services: []
  resources:
  - turso
  ports:
  - 3050
- name: scheduler-worker
  type: worker
  version: 0.1.0
  description: |
    Time-based job scheduler and dispatcher. Manages cron-like jobs, delayed job execution, and recurring task scheduling. Maintains job registry with scheduling metadata and execution history.
  current_status: stub
  target_status: independent
  planned_capabilities:
  - durable scheduling and dispatch beyond current stub implementation
  services: []
  resources:
  - turso
  ports:
  - 3060
- name: sync-reconciler-worker
  type: worker
  version: 0.1.0
  description: |
    Sync conflict resolution and reconciliation worker. Handles offline-first sync scenarios, detects conflicts between client and server state, applies conflict resolution strategies, and reconciles divergent state. Supports CRDT-based and last-write-wins resolution strategies.
  current_status: stub
  target_status: independent
  planned_capabilities:
  - real reconciliation engine beyond current stub implementation
  services: []
  resources:
  - turso
  ports:
  - 3070
- name: web-bff
  type: bff
  version: 1.0.0
  description: |
    Web backend-for-frontend for user-facing surfaces. Aggregates reference services into view-oriented APIs and exposes the primary synchronous reference entrypoints.
  current_status: implemented
  target_status: independent
  services:
  - counter-service
  - tenant-service
  resources:
  - cache
  ports:
  - 3010
