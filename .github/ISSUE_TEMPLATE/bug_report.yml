name: Bug report
description: Report a reproducible problem in this template
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How can we reproduce it?
      placeholder: |
        1. Clone template
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / macOS 15 / Ubuntu 24.04

  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: e.g. stable or 1.90.0

  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: e.g. 1.3.11

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or screenshots.
      render: shell
