name: Bug report
description: Report a reproducible problem in the repository
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce.

  - type: dropdown
    id: user_type
    attributes:
      label: User type
      description: Are you using the template, or contributing to the upstream repository?
      options:
        - Template user
        - Upstream contributor / maintainer
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Getting started / setup
        - Local development
        - Template init
        - Counter reference chain
        - Contracts / generated artifacts
        - Services
        - Servers / BFF
        - Workers / replay / delivery
        - Platform model / topology
        - Secrets / SOPS / GitOps
        - Frontend or desktop shell
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: How can we reproduce it?
      placeholder: |
        1. Clone repository
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / macOS 15 / Ubuntu 24.04

  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: e.g. stable or 1.90.0

  - type: input
    id: bun
    attributes:
      label: Bun version
      placeholder: e.g. 1.3.11

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or screenshots.
      render: shell
