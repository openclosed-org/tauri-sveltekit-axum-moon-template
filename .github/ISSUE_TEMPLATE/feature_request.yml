name: Feature request
description: Suggest an improvement for the repository
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Keep it focused, evidence-based, and aligned with the repository boundaries.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
      placeholder: Describe the gap in current repository behavior.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your preferred solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional alternatives and trade-offs.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope checks
      options:
        - label: This is generic enough for a public reference repository.
          required: true
        - label: This does not add product-specific business logic.
          required: true
