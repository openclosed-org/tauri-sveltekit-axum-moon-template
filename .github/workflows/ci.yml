name: CI

# Backend-first default CI only. Desktop/Tauri validation stays opt-in and local.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/bff/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/bff/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-primary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  primary-static:
    name: Primary Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-static"

      - name: Rust fmt check (primary backend)
        run: just check-backend-primary

  primary-tests:
    name: Primary Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-tests"

      - name: Rust test (primary backend)
        run: just test-backend-primary

  bff-smoke:
    name: BFF Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [primary-static, primary-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-smoke"

      - name: Build BFF servers (primary backend)
        run: >-
          cargo build
          -p web-bff
          --release

      - name: Test web-bff /scalar endpoint
        run: |
          APP_DATABASE_URL=:memory: ./target/release/web-bff &
          WEB_BFF_PID=$!

          sleep 2

          curl -f http://localhost:3010/scalar || exit 1
          echo "web-bff /scalar endpoint accessible"

          curl -f http://localhost:3010/healthz || exit 1
          echo "web-bff /healthz endpoint accessible"

          kill $WEB_BFF_PID || true

  load-test:
    name: Baseline Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [primary-static, primary-tests]
    # Non-blocking: load test requires Turso Cloud DB; skip failure in CI without DB
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-load"

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Build BFF (for load test)
        run: >-
          cargo build
          -p web-bff
          --release

      - name: Run baseline load test
        run: |
          APP_DATABASE_URL=:memory: ./target/release/web-bff &
          WEB_BFF_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3010/healthz > /dev/null 2>&1 && break
            sleep 1
          done

          # Run k6 baseline (short duration for CI)
          cargo run -p repo-tools -- k6-baseline --base-url http://localhost:3010 --duration 10s --vus 3

          kill $WEB_BFF_PID || true

  auth-local-smoke:
    name: Auth Optional Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-auth-optional"

      - name: Rust fmt check (optional auth lane)
        run: just verify-auth-optional

      - name: Rust test (optional auth lane)
        run: just test-auth-optional

  summary:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [primary-static, primary-tests, bff-smoke, load-test, auth-local-smoke]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Backend Primary Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Primary backend admission covers the default business chain only." >> $GITHUB_STEP_SUMMARY
          echo "Secondary/governance checks live in the separate Quality Gate workflow." >> $GITHUB_STEP_SUMMARY
          echo "Auth local smoke is optional and non-blocking." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Primary Static Checks | ${{ needs.primary-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Primary Tests | ${{ needs.primary-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BFF Smoke Tests | ${{ needs.bff-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline Load Test | ${{ needs.load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Optional Smoke | ${{ needs.auth-local-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.primary-static.result }}" = "success" ] && \
             [ "${{ needs.primary-tests.result }}" = "success" ] && \
             [ "${{ needs.bff-smoke.result }}" = "success" ] && \
             [ "${{ needs.load-test.result }}" = "success" -o "${{ needs.load-test.result }}" = "skipped" ]; then
            echo "Primary backend admission passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Primary backend admission failed. Review the failing primary jobs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ "${{ needs.auth-local-smoke.result }}" = "success" ]; then
            echo "Optional auth smoke passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Optional auth smoke is non-blocking. Review it separately if auth lane changed." >> $GITHUB_STEP_SUMMARY
          fi
