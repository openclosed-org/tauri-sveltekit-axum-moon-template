name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.82.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Rust check
        run: cargo check --workspace --exclude desktop-ui-tauri

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --exclude desktop-ui-tauri -- -D warnings

      - name: Rust test
        run: cargo test --workspace --exclude desktop-ui-tauri

      - name: Install frontend deps
        working-directory: apps/desktop-ui
        run: bun install --frozen-lockfile

      - name: Frontend check
        working-directory: apps/desktop-ui
        run: bun run check

      - name: Frontend lint
        working-directory: apps/desktop-ui
        run: bun run lint

      - name: Frontend build
        working-directory: apps/desktop-ui
        run: bun run build
