name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Toolchain bootstrap complete
        run: echo "CI environment ready on ${{ runner.os }}"

      - name: Rust check
        run: cargo check --workspace --exclude desktop-ui-tauri

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --exclude desktop-ui-tauri -- -D warnings

      - name: Rust test
        run: cargo test --workspace --exclude desktop-ui-tauri

      - name: Install frontend deps
        working-directory: apps/desktop-ui
        run: bun install --frozen-lockfile

      - name: Frontend check
        working-directory: apps/desktop-ui
        run: bun run check

      - name: Frontend lint
        working-directory: apps/desktop-ui
        run: bun run lint

      - name: Frontend build
        working-directory: apps/desktop-ui
        run: bun run build
