name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/bff/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/features/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/adapters/storage/turso/**'
      - 'packages/adapters/telemetry/**'
      - 'packages/adapters/auth/google-backend/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/bff/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/features/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/adapters/storage/turso/**'
      - 'packages/adapters/telemetry/**'
      - 'packages/adapters/auth/google-backend/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-primary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PRIMARY_PACKAGES: >-
    -p domain
    -p kernel
    -p platform
    -p runtime
    -p contracts_api
    -p contracts_auth
    -p contracts_events
    -p contracts_errors
    # shared-utils removed — contents merged into kernel
    -p adapter-telemetry-otel
    -p adapter-telemetry-tracing
    -p storage_turso
    -p adapter-google-backend
    -p feature-auth
    -p feature-counter
    -p user-service
    -p tenant-service
    -p auth-service
    -p counter-service
    -p event-bus
    -p web-bff

jobs:
  primary-static:
    name: Primary Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-static"

      - name: Rust fmt check (primary backend)
        run: >-
          cargo fmt ${PRIMARY_PACKAGES} -- --check

      - name: Rust clippy (primary backend)
        run: >-
          cargo clippy ${PRIMARY_PACKAGES}
          --all-targets
          -- -D warnings

      - name: Rust check (primary backend)
        run: >-
          cargo check ${PRIMARY_PACKAGES}

  primary-tests:
    name: Primary Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-tests"

      - name: Rust test (primary backend)
        run: >-
          cargo test ${PRIMARY_PACKAGES}
          -- --test-threads=4

  bff-smoke:
    name: BFF Smoke Tests
    runs-on: ubuntu-latest
    needs: [primary-static, primary-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-primary-smoke"

      - name: Build BFF servers (primary backend)
        run: >-
          cargo build
          -p web-bff
          --release

      - name: Test web-bff /scalar endpoint
        run: |
          ./target/release/web-bff &
          WEB_BFF_PID=$!

          sleep 2

          curl -f http://localhost:3010/scalar || exit 1
          echo "web-bff /scalar endpoint accessible"

          curl -f http://localhost:3010/healthz || exit 1
          echo "web-bff /healthz endpoint accessible"

          kill $WEB_BFF_PID || true

  summary:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: [primary-static, primary-tests, bff-smoke]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Backend Primary Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Primary Static Checks | ${{ needs.primary-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Primary Tests | ${{ needs.primary-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BFF Smoke Tests | ${{ needs.bff-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.primary-static.result }}" = "success" ] && \
             [ "${{ needs.primary-tests.result }}" = "success" ] && \
             [ "${{ needs.bff-smoke.result }}" = "success" ]; then
            echo "Primary backend admission passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Primary backend admission failed. Review the failing primary jobs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
