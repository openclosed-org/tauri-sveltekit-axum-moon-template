name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/**'
      - 'services/**'
      - 'workers/**'
      - 'platform/**'
      - 'packages/core/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'packages/features/**'
      - 'packages/adapters/storage/**'
      - 'packages/adapters/telemetry/**'
      - 'packages/adapters/auth/google-backend/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/**'
      - 'services/**'
      - 'workers/**'
      - 'platform/**'
      - 'packages/core/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'packages/features/**'
      - 'packages/adapters/storage/**'
      - 'packages/adapters/telemetry/**'
      - 'packages/adapters/auth/google-backend/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BACKEND_PACKAGES: >-
    -p domain
    -p kernel
    -p platform
    -p runtime
    -p contracts_api
    -p contracts_auth
    -p contracts_events
    -p contracts_errors
    -p shared-utils
    -p adapter-telemetry-otel
    -p adapter-telemetry-tracing
    -p storage_surrealdb
    -p storage_turso
    -p adapter-google-backend
    -p feature-auth
    -p feature-counter
    -p feature-admin
    -p feature-agent
    -p feature-chat
    -p feature-settings
    -p user-service
    -p tenant-service
    -p auth-service
    -p counter-service
    -p chat-service
    -p agent-service
    -p event-bus
    -p admin-service
    -p settings-service
    -p pingora-gateway
    -p web-bff
    -p admin-bff
    -p outbox-relay-worker
    -p indexer-worker
    -p projector-worker
    -p scheduler-worker
    -p sync-reconciler-worker
    -p platform-validator
    -p dependency-validator
    -p contract-drift-detector
    -p topology-validator
    -p security-validator
    -p observability-validator
    -p platform-generator

jobs:
  # ============================================
  # Backend: Lint, Build, Test
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-ci"

      - name: Rust fmt check (backend only)
        run: >
          cargo fmt ${BACKEND_PACKAGES} -- --check

      - name: Rust clippy (backend only)
        run: >
          cargo clippy ${BACKEND_PACKAGES}
          --all-targets
          -- -D warnings

      - name: Rust check (backend only)
        run: >
          cargo check ${BACKEND_PACKAGES}

      - name: Rust test (backend only)
        run: >
          cargo test ${BACKEND_PACKAGES}
          -- --test-threads=4

      - name: Build BFF servers (backend only)
        run: >
          cargo build
          -p web-bff
          -p admin-bff
          --release

      - name: Test web-bff /scalar endpoint
        run: |
          # Start web-bff in background
          ./target/release/web-bff &
          WEB_BFF_PID=$!
          
          # Wait for startup
          sleep 2
          
          # Test /scalar endpoint
          curl -f http://localhost:3010/scalar || exit 1
          echo "✅ web-bff /scalar endpoint accessible"
          
          # Test /healthz endpoint
          curl -f http://localhost:3010/healthz || exit 1
          echo "✅ web-bff /healthz endpoint accessible"
          
          # Cleanup
          kill $WEB_BFF_PID || true

      - name: Test admin-bff /scalar endpoint
        run: |
          # Start admin-bff in background
          ./target/release/admin-bff &
          ADMIN_BFF_PID=$!
          
          # Wait for startup
          sleep 2
          
          # Test /scalar endpoint
          curl -f http://localhost:3020/scalar || exit 1
          echo "✅ admin-bff /scalar endpoint accessible"
          
          # Test /healthz endpoint
          curl -f http://localhost:3020/healthz || exit 1
          echo "✅ admin-bff /healthz endpoint accessible"
          
          # Cleanup
          kill $ADMIN_BFF_PID || true
