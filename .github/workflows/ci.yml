name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Backend: Lint, Build, Test
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-ci"

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy (backend only)
        run: >
          cargo clippy --workspace
          --exclude native-tauri
          --all-targets
          -- -D warnings

      - name: Rust check (backend only)
        run: >
          cargo check --workspace
          --exclude native-tauri

      - name: Rust test (backend only)
        run: >
          cargo test --workspace
          --exclude native-tauri
          -- --test-threads=4

      - name: Build BFF servers
        run: >
          cargo build --workspace
          --exclude native-tauri
          --release
