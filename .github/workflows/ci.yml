name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Backend: Lint, Build, Test
  # ============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-ci"

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy (backend only)
        run: >
          cargo clippy --workspace
          --exclude native-tauri
          --all-targets
          -- -D warnings

      - name: Rust check (backend only)
        run: >
          cargo check --workspace
          --exclude native-tauri

      - name: Rust test (backend only)
        run: >
          cargo test --workspace
          --exclude native-tauri
          -- --test-threads=4

      - name: Build BFF servers
        run: >
          cargo build --workspace
          --exclude native-tauri
          --release

      - name: Test web-bff /scalar endpoint
        run: |
          # Start web-bff in background
          ./target/release/web-bff &
          WEB_BFF_PID=$!
          
          # Wait for startup
          sleep 2
          
          # Test /scalar endpoint
          curl -f http://localhost:3010/scalar || exit 1
          echo "✅ web-bff /scalar endpoint accessible"
          
          # Test /healthz endpoint
          curl -f http://localhost:3010/healthz || exit 1
          echo "✅ web-bff /healthz endpoint accessible"
          
          # Cleanup
          kill $WEB_BFF_PID || true

      - name: Test admin-bff /scalar endpoint
        run: |
          # Start admin-bff in background
          ./target/release/admin-bff &
          ADMIN_BFF_PID=$!
          
          # Wait for startup
          sleep 2
          
          # Test /scalar endpoint
          curl -f http://localhost:3020/scalar || exit 1
          echo "✅ admin-bff /scalar endpoint accessible"
          
          # Test /healthz endpoint
          curl -f http://localhost:3020/healthz || exit 1
          echo "✅ admin-bff /healthz endpoint accessible"
          
          # Cleanup
          kill $ADMIN_BFF_PID || true
