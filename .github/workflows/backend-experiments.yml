name: Backend Experiments

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-experiments-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  compile-drift:
    name: Compile Drift (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: stable
            allow_failure: false
          - toolchain: beta
            allow_failure: true

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: backend-experiments-${{ matrix.toolchain }}

      - name: Cargo check (all backend tiers)
        run: just verify-backend-experiments

      - name: Cargo clippy (stable baseline)
        if: matrix.toolchain == 'stable'
        run: just lint-backend-experiments
