name: Backend Alternatives

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'packages/data-adapters/surrealdb/**'
      - 'services/tenant-service/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'packages/data-adapters/surrealdb/**'
      - 'services/tenant-service/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-alternatives-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  alternatives-static:
    name: Alternative Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-alternatives-static"

      - name: Rust fmt check (alternative backend)
        run: just verify-backend-alternative

  alternatives-tests:
    name: Alternative Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "backend-alternatives-tests"

      - name: Rust test (alternative backend)
        run: just test-backend-alternative
