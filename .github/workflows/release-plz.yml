name: Release Automation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/release-plz.yml'
      - 'release-plz.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Justfile'
      - 'justfiles/template.just'
      - 'tools/repo-release/**'
      - 'servers/**'
      - 'services/**'
      - 'workers/**'
      - 'platform/**'
      - 'packages/contracts/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-line:
    name: Detect Repository Release Bootstrap
    runs-on: ubuntu-latest

    outputs:
      has_repo_tag: ${{ steps.detect.outputs.has_repo_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect official repository semver tags
        id: detect
        run: |
          if git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -q .; then
            echo "has_repo_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_repo_tag=false" >> "$GITHUB_OUTPUT"
            echo "No official repository semver tag found yet. Bootstrap the first repository release manually with your chosen starting tag, then let release-plz continue from there." >> "$GITHUB_STEP_SUMMARY"
          fi

  semver:
    name: Repository SemVer Check
    runs-on: ubuntu-latest
    needs: [release-line]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run repository semver check
        run: just semver-check

  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    needs: [release-line, semver]
    if: needs.release-line.outputs.has_repo_tag == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          manifest_path: tools/repo-release/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: GitHub Release
    if: github.event_name == 'workflow_dispatch' && needs.release-line.outputs.has_repo_tag == 'true'
    runs-on: ubuntu-latest
    needs: [release-line, semver]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
          manifest_path: tools/repo-release/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
