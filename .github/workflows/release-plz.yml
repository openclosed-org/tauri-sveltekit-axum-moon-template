name: Release Automation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-line:
    name: Detect Active Release Line
    runs-on: ubuntu-latest

    outputs:
      has_v0_1_tag: ${{ steps.detect.outputs.has_v0_1_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect official 0.1.x tags
        id: detect
        run: |
          if git tag -l 'v0.1.*' | grep -q .; then
            echo "has_v0_1_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_v0_1_tag=false" >> "$GITHUB_OUTPUT"
            echo "No official v0.1.x tag found yet. Bootstrap the first repository release manually as v0.1.0, then let release-plz continue the 0.1.x line." >> "$GITHUB_STEP_SUMMARY"
          fi

  semver:
    name: Repository SemVer Check
    runs-on: ubuntu-latest
    needs: [release-line]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run repository semver check
        run: just semver-check

  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    needs: [release-line, semver]
    if: needs.release-line.outputs.has_v0_1_tag == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: GitHub Release
    if: github.event_name == 'workflow_dispatch' && needs.release-line.outputs.has_v0_1_tag == 'true'
    runs-on: ubuntu-latest
    needs: [release-line, semver]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
