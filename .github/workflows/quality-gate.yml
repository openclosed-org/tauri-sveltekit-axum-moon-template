name: Quality Gate

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Phase 1: Security Audit (backend only)
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate"

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit dependencies (backend only)
        run: >
          cargo audit --deny warnings
          --exclude native-tauri

      - name: Check for unsafe code in production crates
        run: |
          # Only check backend src/ directories
          ! grep -rn '#\[unsafe\]' --include="*.rs" packages/ services/ servers/ workers/ 2>/dev/null || true

  # ============================================
  # Phase 2: Coverage (backend only, main branch)
  # ============================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "coverage"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage (backend only)
        run: >
          cargo llvm-cov --workspace
          --exclude native-tauri
          --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: lcov.info
          retention-days: 30

  # ============================================
  # Phase 3: E2E Tests (main/develop only)
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Install Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Web E2E Tests
        working-directory: apps/web
        run: bun run test:e2e --project=desktop
        timeout-minutes: 20

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7

  # ============================================
  # Summary Report
  # ============================================
  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [security, coverage, e2e]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.security.result }}" == "success" ] && \
             ([ "${{ needs.coverage.result }}" == "success" ] || [ "${{ needs.coverage.result }}" == "skipped" ]) && \
             ([ "${{ needs.e2e.result }}" == "success" ] || [ "${{ needs.e2e.result }}" == "skipped" ]); then
            echo "✅ **All quality gates passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality gate failed. Please review the errors above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
