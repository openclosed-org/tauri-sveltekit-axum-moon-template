name: Quality Gate

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/**'
      - 'services/**'
      - 'workers/**'
      - 'platform/**'
      - 'packages/core/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/shared/**'
      - 'packages/features/**'
      - 'packages/adapters/storage/**'
      - 'packages/adapters/telemetry/**'
      - 'packages/adapters/auth/google-backend/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BACKEND_PACKAGES: >-
    -p domain
    -p kernel
    -p platform
    -p runtime
    -p contracts_api
    -p contracts_auth
    -p contracts_events
    -p contracts_errors
    -p shared-utils
    -p adapter-telemetry-otel
    -p adapter-telemetry-tracing
    -p storage_surrealdb
    -p storage_turso
    -p adapter-google-backend
    -p feature-auth
    -p feature-counter
    -p feature-admin
    -p feature-agent
    -p feature-chat
    -p feature-settings
    -p user-service
    -p tenant-service
    -p auth-service
    -p counter-service
    -p chat-service
    -p agent-service
    -p event-bus
    -p admin-service
    -p settings-service
    -p pingora-gateway
    -p web-bff
    -p admin-bff
    -p outbox-relay-worker
    -p indexer-worker
    -p projector-worker
    -p scheduler-worker
    -p sync-reconciler-worker
    -p platform-validator
    -p dependency-validator
    -p contract-drift-detector
    -p topology-validator
    -p security-validator
    -p observability-validator
    -p platform-generator

jobs:
  # ============================================
  # Phase 1: Security Audit (backend only)
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate"

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Audit dependencies (backend only)
        run: >
          cargo deny
          --exclude workspace-hack
          --exclude native-tauri
          --exclude runtime_tauri
          --exclude adapter-google
          check advisories

      - name: Check for unsafe code in production crates
        run: |
          ! grep -rn '#\[unsafe\]' --include="*.rs" packages/ services/ servers/ workers/ 2>/dev/null || true

  # ============================================
  # Phase 2: Coverage (backend only, main branch)
  # ============================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "coverage"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage (backend only)
        run: >
          cargo llvm-cov ${BACKEND_PACKAGES}
          --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Summary Report
  # ============================================
  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [security, coverage]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.security.result }}" == "success" ] && \
             ([ "${{ needs.coverage.result }}" == "success" ] || [ "${{ needs.coverage.result }}" == "skipped" ]); then
            echo "✅ **All quality gates passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality gate failed. Please review the errors above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
