name: Quality Gate (Secondary/Governance)

# Backend/platform governance only. Desktop/Tauri checks are intentionally excluded from default CI.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/gateway/**'
      - 'workers/**'
      - 'platform/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/gateway/**'
      - 'workers/**'
      - 'platform/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-security"

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Audit dependencies (governance and primary backend)
        run: >-
          cargo deny
          --exclude-dev
          --exclude workspace-hack
          --exclude sdk-counter
          --exclude sdk-counter-embedded
          --exclude sdk-counter-http
          --exclude adapter-google
          --exclude storage_surrealdb
          check advisories

      - name: Check for unsafe code in production crates
        run: cargo run -p repo-tools -- validate-unsafe-code

  governance-static:
    name: Governance Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-static"

      - name: Rust fmt check (secondary backend)
        run: just verify-backend-secondary

      - name: Explain scope
        run: |
          echo "Quality Gate covers secondary backend and governance lanes only." >> $GITHUB_STEP_SUMMARY
          echo "Default business-chain admission lives in CI -> Primary Static Checks / Primary Tests / BFF Smoke Tests." >> $GITHUB_STEP_SUMMARY

  secondary-runtime:
    name: Secondary Runtime Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-runtime"

      - name: Rust test (secondary backend)
        run: just test-backend-secondary

      - name: Build gateway and workers (secondary backend)
        run: >-
          cargo build
          -p pingora-gateway
          -p outbox-relay-worker
          -p indexer-worker
          -p projector-worker
          -p scheduler-worker
          -p sync-reconciler-worker
          --release

  platform-drift:
    name: Platform Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-platform-drift"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Platform drift check
        run: just verify-generated-artifacts

  contract-drift:
    name: Contract Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Contract drift check
        run: just drift-check

  semver:
    name: Repository SemVer Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Resolve SemVer release type
        id: release-type
        env:
          DEFAULT_RELEASE_TYPE: ${{ vars.RELEASE_TYPE || 'minor' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          release_type="$DEFAULT_RELEASE_TYPE"

          if [ -n "$BASE_SHA" ] && git rev-parse -q --verify "$BASE_SHA" >/dev/null; then
            commits="$(git log --format=%B "$BASE_SHA..$HEAD_SHA")"
          else
            commits="$(git log --format=%B -1 "$HEAD_SHA")"
          fi

          if printf '%s\n' "$commits" | grep -Eq '^[a-z]+(\([^)]+\))?!:|^BREAKING CHANGE:'; then
            release_type="major"
          fi

          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"
          echo "SemVer release type: $release_type" >> "$GITHUB_STEP_SUMMARY"

      - name: SemVer compatibility check
        run: just semver-check '' '${{ steps.release-type.outputs.release_type }}'


  validation-scripts:
    name: Validation Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Validate state
        run: just validate-state strict

      - name: Validate contracts
        run: just verify-contracts strict

      - name: Validate imports
        run: just gate-imports strict

      - name: Boundary check
        run: cargo run -p repo-tools -- boundary-check

  supply-chain:
    name: Supply Chain Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [security, governance-static, secondary-runtime, platform-drift, contract-drift, semver, validation-scripts, supply-chain]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance Static Checks | ${{ needs.governance-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secondary Runtime Validation | ${{ needs.secondary-runtime.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform Drift Check | ${{ needs.platform-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Drift Check | ${{ needs.contract-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository SemVer Check | ${{ needs.semver.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supply Chain Scan | ${{ needs.supply-chain.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          semver_result="${{ needs.semver.result }}"

          if [ "${{ needs.security.result }}" = "success" ] && \
             [ "${{ needs.governance-static.result }}" = "success" ] && \
             [ "${{ needs.secondary-runtime.result }}" = "success" ] && \
             [ "${{ needs.platform-drift.result }}" = "success" ] && \
             [ "${{ needs.contract-drift.result }}" = "success" ] && \
             { [ "$semver_result" = "success" ] || [ "$semver_result" = "skipped" ]; } && \
             [ "${{ needs.validation-scripts.result }}" = "success" ] && \
             [ "${{ needs.supply-chain.result }}" = "success" ]; then
            echo "All governance checks passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Quality gate failed. Review the secondary or governance jobs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
