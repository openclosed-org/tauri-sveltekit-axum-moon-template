name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Phase 1: Code Quality (Lint & Type Check)
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tauri-sveltekit"

      # Rustfmt check
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      # Clippy linting
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Check for secrets (basic)
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "sk-\|api_key\|password\s*=" --include="*.rs" . 2>/dev/null | grep -v ".git" || true

      # Check for debug statements
      - name: Check for console.log/debug
        run: |
          ! grep -rn "println!\|dbg!" --include="*.rs" src/ . 2>/dev/null | grep -v "tests/" || true

  # ============================================
  # Phase 2: Build Verification
  # ============================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tauri-sveltekit"

      # Build all workspace crates
      - name: Build workspace
        run: cargo build --workspace --release

      # Verify no unused dependencies
      - name: Check for unused dependencies
        run: cargo build --workspace 2>&1 | grep -i "unused" || true

  # ============================================
  # Phase 3: Unit & Integration Tests
  # ============================================
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tauri-sveltekit"

      # Run unit tests with coverage
      - name: Run tests
        run: |
          cargo test --workspace --all-features -- --nocapture --test-threads=4

      # Run doc tests
      - name: Run doc tests
        run: cargo test --workspace --doc

  # ============================================
  # Phase 4: Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Check for vulnerabilities
      - name: Audit dependencies
        run: |
          cargo audit || true

      # Check for unsafe code
      - name: Check for unsafe code
        run: |
          ! grep -rn "#\[unsafe\]" --include="*.rs" . 2>/dev/null | grep -v "tests/" || true

      # Verify no hardcoded secrets
      - name: Verify no secrets
        run: |
          ! grep -rnE "(jwt_secret|api_key|password)\s*=\s*[\'\"]?[a-zA-Z0-9]{20,}" --include="*.rs" . 2>/dev/null || true

  # ============================================
  # Phase 5: Frontend Tests
  # ============================================
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'bun'

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      # Type check
      - name: Type check
        working-directory: apps/web
        run: bun run check

      # Lint
      - name: Lint
        working-directory: apps/web
        run: bun run lint

      # Unit tests
      - name: Unit tests
        working-directory: apps/web
        run: bun run test:unit

  # ============================================
  # Phase 6: E2E Tests (Optional - Manual Trigger)
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'bun'

      - name: Install Playwright
        working-directory: apps/web
        run: bun add -D @playwright/test && npx playwright install --with-deps

      # Run E2E tests
      - name: Run E2E tests
        working-directory: apps/web
        run: bun run test:e2e
        continue-on-error: true

      # Upload test results
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ============================================
  # Phase 7: Build Binary
  # ============================================
  binary:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Summary Report
  # ============================================
  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, build, test, security, frontend]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.security.result }}" == "success" ] && \
             [ "${{ needs.frontend.result }}" == "success" ]; then
            echo "✅ **All quality gates passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality gate failed. Please review the errors above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi