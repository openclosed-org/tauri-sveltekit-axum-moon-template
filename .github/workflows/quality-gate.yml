name: Quality Gate

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/gateway/**'
      - 'workers/**'
      - 'platform/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
      - 'packages/sdk/**'
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/gateway/**'
      - 'workers/**'
      - 'platform/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
      - 'packages/sdk/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SECONDARY_PACKAGES: >-
    -p pingora-gateway
    -p outbox-relay-worker
    -p indexer-worker
    -p projector-worker
    -p scheduler-worker
    -p sync-reconciler-worker
    -p platform-validator
    -p dependency-validator
    -p contract-drift-detector
    -p topology-validator
    -p security-validator
    -p observability-validator
    -p platform-generator

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-security"

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Audit dependencies (governance and primary backend)
        run: >-
          cargo deny
          --exclude-dev
          --exclude workspace-hack
          --exclude native-tauri
          --exclude runtime_tauri
          --exclude adapter-google
          --exclude storage_surrealdb
          check advisories

      - name: Check for unsafe code in production crates
        run: |
          ! grep -rn '#\[unsafe\]' --include="*.rs" packages/ services/ servers/ workers/ platform/validators/ 2>/dev/null || true

  governance-static:
    name: Governance Static Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-static"

      - name: Rust fmt check (secondary backend)
        run: >-
          cargo fmt ${SECONDARY_PACKAGES} -- --check

      - name: Rust clippy (secondary backend)
        run: >-
          cargo clippy ${SECONDARY_PACKAGES}
          --all-targets
          -- -D warnings

      - name: Rust check (secondary backend)
        run: >-
          cargo check ${SECONDARY_PACKAGES}

  secondary-runtime:
    name: Secondary Runtime Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-runtime"

      - name: Rust test (secondary backend)
        run: >-
          cargo test ${SECONDARY_PACKAGES}
          -- --test-threads=4

      - name: Build gateway and workers (secondary backend)
        run: >-
          cargo build
          -p pingora-gateway
          -p outbox-relay-worker
          -p indexer-worker
          -p projector-worker
          -p scheduler-worker
          -p sync-reconciler-worker
          --release

  platform-drift:
    name: Platform Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality-gate-platform-drift"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Platform drift check
        run: just verify-generated

  contract-drift:
    name: Contract Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Contract drift check
        run: just drift-check

  sdk-drift:
    name: SDK Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install just
        uses: taiki-e/install-action@just

      - name: SDK drift check
        run: just sdk-drift-check


  validation-scripts:
    name: Validation Scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate state
        run: bun run scripts/validate-state.ts --mode strict

      - name: Validate contracts
        run: bun run scripts/validate-contracts.ts --mode strict

      - name: Validate imports
        run: bun run scripts/validate-imports.ts --mode strict

      - name: Boundary check
        run: |
          # Install Rust for cargo tree
          rustup toolchain install stable
          rustup default stable
          bun run scripts/boundary-check.ts

  supply-chain:
    name: Supply Chain Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [security, governance-static, secondary-runtime, platform-drift, contract-drift, sdk-drift, validation-scripts, supply-chain]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Governance Static Checks | ${{ needs.governance-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secondary Runtime Validation | ${{ needs.secondary-runtime.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform Drift Check | ${{ needs.platform-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Drift Check | ${{ needs.contract-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK Drift Check | ${{ needs.sdk-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supply Chain Scan | ${{ needs.supply-chain.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.security.result }}" = "success" ] && \
             [ "${{ needs.governance-static.result }}" = "success" ] && \
             [ "${{ needs.secondary-runtime.result }}" = "success" ] && \
             [ "${{ needs.platform-drift.result }}" = "success" ] && \
             [ "${{ needs.contract-drift.result }}" = "success" ] && \
             [ "${{ needs.sdk-drift.result }}" = "success" ] && \
             [ "${{ needs.validation-scripts.result }}" = "success" ] && \
             [ "${{ needs.supply-chain.result }}" = "success" ]; then
            echo "All governance checks passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "Quality gate failed. Review the secondary or governance jobs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
