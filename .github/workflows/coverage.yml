name: Coverage

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/quality-gate.yml'
      - '.github/workflows/coverage.yml'
      - '.github/workflows/backend-alternatives.yml'
      - '.github/workflows/backend-experiments.yml'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'deny.toml'
      - 'servers/bff/**'
      - 'services/**'
      - 'packages/kernel/**'
      - 'packages/platform/**'
      - 'packages/runtime/**'
      - 'packages/contracts/**'
      - 'packages/messaging/**'
      - 'packages/data/**'
      - 'packages/data-traits/**'
      - 'packages/data-adapters/**'
      - 'packages/authn/**'
      - 'packages/authz/**'
      - 'packages/observability/**'
      - 'packages/sdk/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PRIMARY_PACKAGES: >-
    -p kernel
    -p platform
    -p runtime
    -p contracts_api
    -p contracts_auth
    -p contracts_events
    -p contracts_errors
    -p adapter-telemetry-otel
    -p adapter-telemetry-tracing
    -p storage_turso
    -p adapter-google-backend
    -p user-service
    -p tenant-service
    -p auth-service
    -p counter-service
    -p event-bus
    -p web-bff
    -p data
    -p authz
    -p observability
    -p sdk-counter
    -p sdk-counter-embedded
    -p sdk-counter-http

jobs:
  coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "coverage-primary"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage (primary backend)
        run: >-
          cargo llvm-cov ${PRIMARY_PACKAGES}
          --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_id }}
          path: lcov.info
          retention-days: 30
