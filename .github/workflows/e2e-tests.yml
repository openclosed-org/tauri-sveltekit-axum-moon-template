name: Cross-Platform E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================
  # Desktop E2E Tests (WDIO + Tauri WebDriver)
  # ============================================
  desktop-e2e:
    name: Desktop E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # macOS excluded: tauri-driver not officially supported

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "desktop-e2e"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install matching Edge driver
        if: runner.os == 'Windows'
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $HOME/.cargo/bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install WDIO dependencies
        working-directory: e2e-tests
        run: bun install --frozen-lockfile

      - name: Run Desktop E2E Tests (CI Mode, Linux)
        if: runner.os == 'Linux'
        working-directory: e2e-tests
        run: xvfb-run bun run test:ci
        timeout-minutes: 30

      - name: Run Desktop E2E Tests (CI Mode, Windows)
        if: runner.os == 'Windows'
        working-directory: e2e-tests
        run: bun run test:ci
        timeout-minutes: 30

      - name: Upload WDIO JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wdio-junit-${{ matrix.os }}
          path: e2e-tests/test-results/junit/

      - name: Print Test Summary
        if: always()
        run: |
          echo "## Desktop E2E Test Results (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Link |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| JUnit XML | [Download](artifact://wdio-junit-${{ matrix.os }}) |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Web E2E Tests (Playwright)
  # ============================================
  web-e2e:
    name: Web E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        working-directory: apps/client/web/app
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/client/web/app
        run: npx playwright install --with-deps chromium

      - name: Run Web E2E Tests
        working-directory: apps/client/web/app
        run: bun run test:e2e --project=desktop-chrome
        timeout-minutes: 20

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-e2e-evidence-${{ github.job }}-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/client/web/app/playwright-report/
            apps/client/web/app/playwright-results.xml
            apps/client/web/app/playwright-results.json
            apps/client/web/app/test-results/
            apps/client/web/app/tests/fixtures/tenant.ts
          retention-days: 7

  # ============================================
  # Summary Report
  # ============================================
  summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [desktop-e2e, web-e2e]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop E2E (WDIO) | Ubuntu | ${{ needs.desktop-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop E2E (WDIO) | Windows | ${{ needs.desktop-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web E2E (Playwright) | Ubuntu | ${{ needs.web-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web E2E (Playwright) | Windows | ${{ needs.web-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web E2E (Playwright) | macOS | ${{ needs.web-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.desktop-e2e.result }}" == "success" ] && \
             [ "${{ needs.web-e2e.result }}" == "success" ]; then
            echo "✅ **All E2E tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E tests failed. Check the artifacts above.**" >> $GITHUB_STEP_SUMMARY
          fi
