name: Cross-Platform E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================
  # Web E2E Tests (Playwright)
  # ============================================
  web-e2e:
    name: Web E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.9.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Sync SvelteKit types before E2E
        working-directory: apps/web
        run: bun run check

      - name: Verify runtime_server Turso-only default build
        run: cargo check -p runtime_server

      - name: Run Web E2E Tests
        working-directory: apps/web
        run: bun run test:e2e --project=desktop-chrome
        timeout-minutes: 20

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-e2e-evidence-${{ github.job }}-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/web/playwright-report/
            apps/web/playwright-results.xml
            apps/web/playwright-results.json
            apps/web/test-results/
            apps/web/tests/fixtures/tenant.ts
          retention-days: 7

