  # ============================================
  # Summary Report
  # ============================================
  summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [web-e2e]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Lane | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| web-e2e | ${{ needs.web-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.web-e2e.result }}" == "success" ]; then
            echo "✅ **All E2E tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E tests failed. Check the artifacts above.**" >> $GITHUB_STEP_SUMMARY
          fi
