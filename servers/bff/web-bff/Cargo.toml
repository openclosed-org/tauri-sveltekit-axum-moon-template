[package]
name = "web-bff"
version = "0.1.0"
edition = "2024"
description = "Backend For Frontend — Web端聚合层 (Axum)"
license = "MIT"
rust-version.workspace = true

[dependencies]
# Internal — services (trait-only), contracts, core
counter-service = { workspace = true }
tenant-service = { workspace = true }
user-service = { workspace = true }
event-bus = { workspace = true }
contracts_api = { workspace = true }
contracts_errors = { workspace = true }
contracts_events = { workspace = true }
kernel = { workspace = true }
data = { workspace = true }
storage_turso = { workspace = true }
observability = { workspace = true }
authz = { workspace = true }

# Axum HTTP framework
axum = { workspace = true }
axum-extra = { workspace = true }
tokio = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
hyper = { workspace = true }
reqwest = { workspace = true }

# Serialization & validation
serde = { workspace = true }
serde_json = { workspace = true }
validator = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Configuration
figment = { workspace = true }

# Auth
jsonwebtoken = { workspace = true }
base64 = { workspace = true }

# Tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-log = { workspace = true }

# Cache
moka = { workspace = true }

# Utilities
chrono = { workspace = true }
uuid = { workspace = true, features = ["v7"] }
async-trait = "0.1"
futures-util = "0.3"

# API documentation
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-scalar = { version = "0.2", features = ["axum"] }

[dev-dependencies]
http-body-util = "0.1"
tower = { workspace = true, features = ["util"] }
tracing-test = { workspace = true }
jsonwebtoken = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4"] }

[features]
default = []

[lints]
workspace = true
