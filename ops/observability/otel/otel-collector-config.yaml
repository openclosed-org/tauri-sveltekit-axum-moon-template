# OpenTelemetry Collector Configuration
#
# This config runs the OTel Collector as a sidecar or standalone service.
# It receives traces/metrics from applications and exports to OpenObserve.
#
# For Docker Compose dev environment, the collector can be added to
# infra/docker/compose/observability.yaml when needed.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

  # Add resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: "tauri-sveltekit-axum"
        action: upsert
      - key: deployment.environment
        value: "dev"
        action: upsert

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  # Export to OpenObserve via OTLP HTTP
  otlphttp/openobserve:
    endpoint: "http://openobserve:5080/api/default"
    headers:
      Organization: default
      Authorization: "Basic YWRtaW5AbG9jYWxob3N0LmNvbTphZG1pbg=="  # admin@localhost.com:admin (base64)

  # Debug exporter (for development troubleshooting)
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/openobserve, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/openobserve]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/openobserve]
