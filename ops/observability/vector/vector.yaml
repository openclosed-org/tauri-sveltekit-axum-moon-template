# Vector Configuration — Log Router (Podman-compatible)
#
# This config collects container logs and forwards them to OpenObserve.
# Used by: infra/docker/compose/observability.yaml
#
# Podman compatibility: compose mounts the Podman Docker-compatible socket at
# /var/run/docker.sock and sets DOCKER_HOST=unix:///var/run/docker.sock.

data_dir: /var/lib/vector

# ── Sources ──────────────────────────────────────────────────
# Read container logs via the Docker-compatible API socket.
sources:
  container_logs:
    type: docker_logs
    docker_host: "unix:///var/run/docker.sock"
    exclude_containers:
      - vector
      - openobserve

# ── Transforms ───────────────────────────────────────────────
transforms:
  # Add metadata labels
  add_metadata:
    type: remap
    inputs:
      - container_logs
    source: |
      .environment = "dev"
      .service = if exists(.container_name) { .container_name } else { "unknown" }

  # Parse JSON logs (if the app outputs structured JSON logs)
  parse_json:
    type: remap
    inputs:
      - add_metadata
    source: |
      parsed, err = parse_json(.message)
      if err == null {
          .structured = parsed
          .level = if exists(parsed.level) {
              parsed.level
          } else if exists(.level) {
              .level
          } else {
              "info"
          }
      } else {
          .level = "info"
      }

# ── Sinks ────────────────────────────────────────────────────
sinks:
  # Send all logs to OpenObserve via HTTP API
  openobserve:
    type: http
    inputs:
      - parse_json
    uri: "http://openobserve:5080/api/default/_json"
    method: post
    auth:
      strategy: basic
      user: "admin@localhost.com"
      password: "admin"
    encoding:
      codec: json
    batch:
      max_bytes: 524288  # 512KB
      timeout_secs: 5
    healthcheck:
      enabled: true
    request:
      headers:
        Organization: default
        Stream-Type: logs
