canonical_definitions:
  Repository: GitHub repository normalized into internal model
  Subscription: product-level tracking relation between user profile and repository
  Signal: normalized, deduplicated, user-facing change object
  RankingView: reusable leaderboard definition
  RankingSnapshot: persisted result of a ranking view at a point in time
  Resource: GitHub-backed agent productivity asset relevant to language/framework context
  Digest: batched summary of signals over a fixed time window
  Snapshot: persisted point-in-time state used for comparison and trend computation
  Relevance: explicit tag-overlap and rule-based relation score; not opaque recommendation magic
