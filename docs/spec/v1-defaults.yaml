version: 1.0.0
status: draft_for_build

runtime:
  primary_delivery_target:
    - macOS_desktop
    - Windows_desktop
  architecture_mode: local_first
  frontend:
    framework: SvelteKit
    rendering_mode: SPA_static_adapter
  shell: Tauri
  local_database: SQLite
  future_cloud:
    api: Axum
    database: Turso

subscription_defaults:
  tracking_mode: TRACKING_STANDARD
  default_signal_types:
    - RELEASE_PUBLISHED
    - TAG_PUBLISHED
    - DEFAULT_BRANCH_ACTIVITY_DIGEST
  default_digest_window: 24h
  allowed_digest_windows:
    - 12h
    - 24h
  notify_high_immediately: true
  max_active_subscriptions_soft: 100
  max_active_subscriptions_hard: 200

topk_defaults:
  allowed_k_values:
    - 10
    - 20
    - 50
    - 100
  default_k: 50
  default_views:
    - name: Popular in Selected Stack
      ranking_mode: STARS_DESC
    - name: Recently Updated in Selected Stack
      ranking_mode: UPDATED_DESC
  default_filters:
    exclude_archived: true
    exclude_forks: true
    min_stars: 50
  snapshot_interval: 12h
  warmup_fallback_mode: UPDATED_DESC

resource_defaults:
  enabled: true
  allowed_kinds:
    - MCP_SERVER
    - SKILL_PACK
    - AGENT_FRAMEWORK
    - TEMPLATE
    - TOOLING
    - EXAMPLE_REPO
  scoring_weights:
    stack_relevance: 0.40
    star_delta_window: 0.25
    recency: 0.20
    curation_bonus: 0.15

signal_priority_defaults:
  RELEASE_PUBLISHED: HIGH
  RELEASE_PRERELEASED: MEDIUM
  TAG_PUBLISHED: MEDIUM
  DEFAULT_BRANCH_ACTIVITY_DIGEST: MEDIUM
  PR_MERGED_DIGEST: LOW
  TOPK_VIEW_CHANGED: LOW
  RESOURCE_EMERGED: LOW
  RESOURCE_RERANKED: LOW

notification_defaults:
  desktop_notification_only_for:
    - HIGH
  digest_enabled: true
  quiet_hours_enabled: true

data_retention:
  signals_days: 180
  repo_snapshots_days: 90
  ranking_snapshots_days: 90
  deliveries_days: 30

performance_targets:
  warm_start_interactive_lt_ms: 1500
  cold_start_interactive_lt_ms: 3000
  page_switch_lt_ms: 200
  cached_first_paint_lt_ms: 300

api_budgeting:
  use_authenticated_requests: true
  separate_search_budget_pool: true
  use_conditional_requests: true
  respect_poll_interval_header: true
