openapi: 3.0.3
info:
  title: Internal API Server
  description: Internal Axum-based API server aggregating all service routes
  version: 0.1.0
  contact:
    name: Platform Team

servers:
  - url: http://localhost:3001
    description: Development server

paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      tags:
        - health
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      summary: Readiness probe
      operationId: readyz
      tags:
        - health
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready

  /api/tenant/init:
    post:
      summary: Initialize a new tenant
      operationId: initTenant
      tags:
        - tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitTenantRequest'
      responses:
        '201':
          description: Tenant initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitTenantResponse'

  /api/counter/increment:
    post:
      summary: Increment counter for current tenant
      operationId: incrementCounter
      tags:
        - counter
      responses:
        '200':
          description: Counter incremented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterResponse'

  /api/counter/decrement:
    post:
      summary: Decrement counter for current tenant
      operationId: decrementCounter
      tags:
        - counter
      responses:
        '200':
          description: Counter decremented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterResponse'

  /api/counter/reset:
    post:
      summary: Reset counter for current tenant
      operationId: resetCounter
      tags:
        - counter
      responses:
        '200':
          description: Counter reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterResponse'

  /api/counter/value:
    get:
      summary: Get current counter value for tenant
      operationId: getCounterValue
      tags:
        - counter
      responses:
        '200':
          description: Current counter value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CounterResponse'

  /api/admin/stats:
    get:
      summary: Get admin dashboard stats
      operationId: getAdminStats
      tags:
        - admin
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardStats'

  /api/settings:
    get:
      summary: Get user settings
      operationId: getSettings
      tags:
        - settings
      responses:
        '200':
          description: User settings
    put:
      summary: Update user settings
      operationId: updateSettings
      tags:
        - settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Settings updated

  /api/user/me:
    get:
      summary: Get current user profile
      operationId: getUserProfile
      tags:
        - user
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object

  /api/user/tenants:
    get:
      summary: Get user's tenants
      operationId: getUserTenants
      tags:
        - user
      responses:
        '200':
          description: List of user's tenants

  /api/agent/conversations:
    get:
      summary: List conversations
      operationId: listConversations
      tags:
        - agent
      responses:
        '200':
          description: Conversation list

  /api/agent/conversations/{id}/messages:
    get:
      summary: Get conversation messages
      operationId: getConversationMessages
      tags:
        - agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message list

  /api/agent/chat:
    post:
      summary: Chat with agent (SSE streaming)
      operationId: chatWithAgent
      tags:
        - agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: SSE stream

components:
  schemas:
    InitTenantRequest:
      type: object
      required:
        - user_sub
        - user_name
      properties:
        user_sub:
          type: string
        user_name:
          type: string

    InitTenantResponse:
      type: object
      properties:
        tenant_id:
          type: string
        role:
          type: string
        created:
          type: boolean

    CounterResponse:
      type: object
      properties:
        value:
          type: integer
          format: int64
        tenant_id:
          type: string

    AdminDashboardStats:
      type: object
      properties:
        tenant_count:
          type: integer
        counter_value:
          type: integer
        last_login:
          type: string
          format: date-time
        app_version:
          type: string

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
