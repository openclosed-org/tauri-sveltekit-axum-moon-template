[workspace]
# NOTE: workers/*, tools/* members will be added when crates are created
members = [
    "apps/client/native/src-tauri",
    "servers/api",
    "packages/core/domain",
    "packages/core/usecases",
    "packages/contracts/api",
    "packages/adapters/hosts/tauri",
]
resolver = "2"

[workspace.dependencies]
# Internal crates
domain = { path = "packages/core/domain" }
usecases = { path = "packages/core/usecases" }
contracts_api = { path = "packages/contracts/api" }

# Tauri
tauri = { version = "2.10.3", features = ["tray-icon"] }
tauri-build = "2.5.6"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-store = "2"
tauri-plugin-fs = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-window-state = "2"
tauri-plugin-libsql = "0.1.0"
tauri-plugin-log = { version = "2", features = ["colored"] }

# Backend - Axum stack
axum = { version = "0.8.8", features = ["json"] }
axum-extra = { version = "0.10", features = ["cookie"] }
tokio = { version = "1.50.0", features = ["full"] }
reqwest = { version = "0.13.2", features = ["rustls", "form", "json"] }

# Axum middleware stack (per D-07, D-09)
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "timeout", "request-id"] }
hyper = { version = "1", features = ["full"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-log = "0.2"
log = "0.4"

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"

# Error handling (2026 best practices)
thiserror = "2"
anyhow = "1"

# Configuration (2026 best practices - figment)
figment = { version = "0.10", features = ["toml", "env"] }

# Validation (2026 best practices)
validator = { version = "0.16", features = ["derive"] }

# Tracing enhancements
tracing-error = "0.2"

# Testing
mockito = "1"

# HTTP client utilities
http-body-util = "0.1"

# Environment variables (2026 best practice - dotenvy)
dotenvy = "0.15.7"

# Database
surrealdb = { version = "3.0.5", features = ["kv-mem", "kv-rocksdb"] }

# Cache (replaces Redis per D-10/D-12)
moka = { version = "0.12", features = ["future"] }

# Auth
jsonwebtoken = "10.3.0"
sha2 = "0.10"
base64 = "0.22"
rand = "0.8"

# Utilities
url = "2"
uuid = { version = "1.23.0", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# ── Phase 5 (DB/Infra) ────────────────────────────────────────
# Local embedded DB
libsql = "0.9"
rusqlite_migration = "1.3"

# HTTP/3 transport (per D-07, D-09)
quinn = "0.11"
h3 = "0.0.6"
rcgen = "0.13"  # Self-signed cert generation for dev

# ── Future Phase Dependencies ──────────────────────────────────
# Phase 6 (Auth)
# oauth2 = "5.0"  # Phase 6: Google OAuth flow

# Phase 8 (Desktop)
tauri-plugin-single-instance = "2"
# tauri-plugin-updater = "2"  # Phase 9: Auto-update

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"

[profile.dev]
panic = "unwind"
