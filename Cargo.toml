[workspace]
members = [
    "apps/desktop-ui/src-tauri",
    "crates/*",
]
resolver = "2"

[workspace.dependencies]
# Tauri
tauri = { version = "2.10.3", features = [] }
tauri-build = "2.5.6"
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-store = "2"
tauri-plugin-fs = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-window-state = "2"
tauri-plugin-libsql = "0.1.0"

# Backend - Axum stack
axum = { version = "0.8.8", features = ["json"] }
axum-extra = { version = "0.10", features = ["cookie"] }
tokio = { version = "1.50.0", features = ["full"] }
reqwest = { version = "0.13.2", features = ["rustls"] }

# Axum middleware stack (per D-07, D-09)
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "timeout", "request-id"] }
hyper = { version = "1", features = ["full"] }

# Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"

# Database
surrealdb = { version = "3.0.5", features = ["kv-mem"] }

# Cache (replaces Redis per D-10/D-12)
moka = { version = "0.12", features = ["future"] }

# Auth
jsonwebtoken = "10.3.0"

# Utilities
uuid = { version = "1.23.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# ── Phase 5 (DB/Infra) ────────────────────────────────────────
# Local embedded DB
libsql = "0.9"
rusqlite_migration = "1.3"

# HTTP/3 transport (per D-07, D-09)
quinn = "0.11"
h3 = "0.0.6"
rcgen = "0.13"  # Self-signed cert generation for dev

# ── Future Phase Dependencies ──────────────────────────────────
# Phase 6 (Auth)
# oauth2 = "5.0"  # Phase 6: Google OAuth flow

# Phase 8 (Desktop)
# tauri-plugin-updater = "2"  # Phase 8: Auto-update

[profile.release]
lto = true
codegen-units = 1
opt-level = "z"
strip = true
panic = "abort"

[profile.dev]
panic = "unwind"
