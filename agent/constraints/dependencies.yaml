# Agent Constraints — 依赖白/黑名单

version: "1.0"

dependency_whitelist:
  # Allowed for ALL crates in the workspace
  global:
    - "serde"
    - "serde_json"
    - "thiserror"
    - "anyhow"
    - "tracing"
    - "async-trait"
    - "uuid"
    - "chrono"
    - "tokio"
    - "futures-util"

  # Forbidden for services (must not appear in services/*/Cargo.toml)
  services_forbidden:
    - "axum"           # BFF/server layer only
    - "sqlx"           # Must use ports/ abstraction
    - "surrealdb"      # Must use ports/ abstraction
    - "libsql"         # Must use adapters/ abstraction
    - "tower"          # Server middleware, not service concern

  # Forbidden for contracts (pure data types)
  contracts_forbidden:
    - "tokio"
    - "axum"
    - "tower"
    - "sqlx"
    - "anyhow"

  # Forbidden for packages/core (base types only)
  core_forbidden:
    - "tokio"
    - "axum"
    - "tower"
    - "sqlx"
    - "surrealdb"
    - "libsql"
    - "reqwest"
