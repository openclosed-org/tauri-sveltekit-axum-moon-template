# cargo-deny configuration (v0.19.0+)
# Docs: https://embarkstudios.github.io/cargo-deny/

# ══════════════════════════════════════════════════════════════
# [graph] — 依赖图配置
# ══════════════════════════════════════════════════════════════
[graph]
all-features = true
targets = []

# ══════════════════════════════════════════════════════════════
# [advisories] — 安全漏洞检查
# ══════════════════════════════════════════════════════════════
[advisories]
version = 2
unmaintained = "workspace"
yanked = "warn"

# 临时忽略的安全漏洞（等待上游依赖修复）
ignore = [
    # rsa 0.9.10 - Marvin Attack 时间侧信道漏洞
    # 原因: jsonwebtoken 10.3.0 依赖 rsa 0.9.10
    # 影响: 可能通过时间侧信道泄露 RSA 私钥信息
    # 风险评估: 零风险 - 项目仅使用 HS256（HMAC-SHA256）算法，不使用 RSA
    # 证据: servers/api/src/middleware/tenant.rs 仅使用 Algorithm::HS256
    # 解决方案: 等待 jsonwebtoken 发布不依赖 rsa 的版本，或项目迁移到其他 JWT 库
    "RUSTSEC-2023-0071",
]

# ══════════════════════════════════════════════════════════════
# [licenses] — 许可证合规检查
# ══════════════════════════════════════════════════════════════
[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.8

# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
    # Tauri 生态依赖
    "MPL-2.0",
    # SurrealDB 许可证
    "BUSL-1.1",
    # 数据许可证
    "CDLA-Permissive-2.0",
]

# 私有 workspace crates 不检查许可证
private = { ignore = true }

# ══════════════════════════════════════════════════════════════
# [bans] — 依赖禁止规则
# ══════════════════════════════════════════════════════════════
# 注意：架构边界检查通过 scripts/boundary-check.ts 实现
# 这里只配置重复依赖的警告级别
[bans]
multiple-versions = "warn"
wildcards = "warn"

# 允许 workspace 依赖重复（hakari 会处理）
[bans.workspace-dependencies]
duplicates = "allow"
unused = "warn"
