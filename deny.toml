# cargo-deny configuration (v0.19.0+)
# Docs: https://embarkstudios.github.io/cargo-deny/

# ══════════════════════════════════════════════════════════════
# [graph] — 依赖图配置
# ══════════════════════════════════════════════════════════════
[graph]
all-features = true
targets = []

# ══════════════════════════════════════════════════════════════
# [advisories] — 安全漏洞检查
# ══════════════════════════════════════════════════════════════
[advisories]
version = 2
unmaintained = "workspace"
yanked = "warn"

# 临时忽略的安全漏洞（等待上游依赖修复）
ignore = [
    # rustls-webpki 0.102.8 - CRL Distribution Point 匹配逻辑问题
    # 原因: libsql 0.9.30 → hyper-rustls 0.25.0 → rustls 0.22.4 → rustls-webpki 0.102.8
    # 影响: 可能导致被撤销的证书被错误接受（需要攻击者控制 CA）
    # 风险评估: 有限影响，因为攻击者需要控制受信任的 CA
    # 解决方案: 等待 libsql 升级到支持 rustls 0.23 的版本
    "RUSTSEC-2026-0049"
]

# ══════════════════════════════════════════════════════════════
# [licenses] — 许可证合规检查
# ══════════════════════════════════════════════════════════════
[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.8

# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
    # Tauri 生态依赖
    "MPL-2.0",
    # SurrealDB 许可证
    "BUSL-1.1",
    # 数据许可证
    "CDLA-Permissive-2.0",
]

# 私有 workspace crates 不检查许可证
private = { ignore = true }

# ══════════════════════════════════════════════════════════════
# [bans] — 依赖禁止规则
# ══════════════════════════════════════════════════════════════
# 注意：架构边界检查通过 scripts/boundary-check.ts 实现
# 这里只配置重复依赖的警告级别
[bans]
multiple-versions = "warn"
wildcards = "warn"

# 允许 workspace 依赖重复（hakari 会处理）
[bans.workspace-dependencies]
duplicates = "allow"
unused = "warn"
