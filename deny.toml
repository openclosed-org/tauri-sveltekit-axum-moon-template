# cargo-deny configuration (v0.19.0+)
# Docs: https://embarkstudios.github.io/cargo-deny/

# ══════════════════════════════════════════════════════════════
# [graph] — 依赖图配置
# ══════════════════════════════════════════════════════════════
[graph]
all-features = true
targets = []

# ══════════════════════════════════════════════════════════════
# [advisories] — 安全漏洞检查
# ══════════════════════════════════════════════════════════════
# 策略：
# - unmaintained: "warn" 级别不阻断 CI（设置为 "none" 忽略）
# - vulnerability: deny（阻断 CI，必须修复或 ignore）
# - yanked: warn（告警但不阻断）
#
# 已知漏洞说明：
# - RUSTSEC-2024-0437 (protobuf): pingora-core → prometheus → protobuf v2
#   影响：pingora-gateway（后端 gateway），需要等待 pingora 升级 prometheus
# - RUSTSEC-2023-0071 (rsa): jsonwebtoken → rsa v0.9
#   影响：auth-service，目前无安全升级，需要关注 upstream 修复进展
[advisories]
version = 2
unmaintained = "none"  # Don't fail on unmaintained crates (warn only)
yanked = "warn"

# Ignore specific vulnerabilities that cannot be fixed upstream yet
# These should be reviewed and removed once fixes are available
ignore = [
    # protobuf v2 stack overflow via untrusted input
    # Source: pingora-core → prometheus → protobuf v2
    # Fix: wait for pingora to upgrade prometheus to 0.14+ (uses protobuf 3.x)
    "RUSTSEC-2024-0437",
    
    # rsa Marvin Attack (timing side-channel)
    # Source: jsonwebtoken → rsa v0.9
    # Fix: no safe upgrade available yet; workaround is to avoid RSA in 
    #       network-observable settings (our usage is JWT signing, lower risk)
    "RUSTSEC-2023-0071",

    # rand unsoundness with custom logger + rand::rng()/thread_rng reseeding
    # Source: backend dependency graph still resolves rand 0.8.x via upstream crates
    # Fix: wait for backend dependencies to move to rand >= 0.9.3; our codebase uses
    #      tracing, not a custom log::Log implementation that re-enters rand during logging
    "RUSTSEC-2026-0097",

    # rustls-webpki CRL distribution point matching (via async-nats, reqwest)
    # Source: rustls-webpki 0.102.8 and 0.103.10 pulled by async-nats, reqwest
    # Fix: wait for async-nats/reqwest to upgrade to rustls-webpki >= 0.103.12
    "RUSTSEC-2026-0049",

    # rustls-webpki URI name constraints accepted incorrectly
    "RUSTSEC-2026-0098",

    # rustls-webpki wildcard name constraints accepted incorrectly
    "RUSTSEC-2026-0099",
]

# ══════════════════════════════════════════════════════════════
# [licenses] — 许可证合规检查
# ══════════════════════════════════════════════════════════════
[licenses]
unused-allowed-license = "warn"
confidence-threshold = 0.8

# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
    # Tauri 生态依赖
    "MPL-2.0",
    # SurrealDB 许可证
    "BUSL-1.1",
    # 数据许可证
    "CDLA-Permissive-2.0",
]

# 私有 workspace crates 不检查许可证
private = { ignore = true }

# ══════════════════════════════════════════════════════════════
# [bans] — 依赖禁止规则
# ══════════════════════════════════════════════════════════════
# 注意：架构边界检查通过 scripts/boundary-check.ts 实现
# 这里只配置重复依赖的警告级别
[bans]
multiple-versions = "warn"
wildcards = "warn"

# 允许 workspace 依赖重复（hakari 会处理）
[bans.workspace-dependencies]
duplicates = "allow"
unused = "warn"
